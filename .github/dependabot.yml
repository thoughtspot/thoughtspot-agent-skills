# Dependabot — automates the maintenance cost of SHA-pinning the CI actions (BL-108).
# Because .github/workflows/validate.yml pins actions to immutable commit SHAs, they no
# longer auto-receive upstream patches; Dependabot watches for new releases and opens a
# PR that bumps each pinned SHA (keeping the `# vX.Y.Z` comment current) for review.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # One consolidated PR for all action bumps rather than one PR per action.
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
