name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so checkers that diff against HEAD/refs behave correctly.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test/runtime deps
        run: |
          pip install pytest pyyaml radon
          pip install -e tools/ts-cli

      - name: Run validators (full-repo mode)
        run: |
          set -e
          # Smoke tests are intentionally excluded — they need live ThoughtSpot /
          # Snowflake credentials and run via scripts/pre-push.sh, not in CI.
          python3 tools/validate/check_secrets.py --root . --all
          python3 tools/validate/check_references.py --root .
          python3 tools/validate/check_patterns.py --root .
          python3 tools/validate/check_version_sync.py --root .
          python3 tools/validate/check_module_health.py --root .
          python3 tools/validate/check_yaml.py --root .
          python3 tools/validate/check_sv_yaml.py --root .
          python3 tools/validate/check_tml.py --root .
          python3 tools/validate/check_consistency.py --root .
          python3 tools/validate/check_skill_versions.py --root .
          python3 tools/validate/check_smoke_tests.py --root .
          python3 tools/validate/check_skill_naming.py --root .
          python3 tools/validate/check_runtime_coverage.py --root .
          python3 tools/validate/check_open_items.py --root . --warn
          # Filesystem-state gates that previously ran ONLY in pre-commit (bypassable
          # via --no-verify with no server-side catch). They derive purely from repo
          # contents, so they work in a clean CI checkout.
          python3 tools/validate/check_coverage_matrix.py --root .
          python3 tools/validate/check_formula_catalog.py --root .
          python3 tools/validate/check_no_v1_endpoints.py --root .
          python3 tools/validate/check_no_inline_tml_gate.py --root .
          python3 tools/validate/check_skill_cli_usage.py --root .
          # Presence gate: every shared mapping/schema must carry a currency anchor
          # (staleness is soft and never fails — only missing/malformed anchors do).
          python3 tools/validate/check_mapping_currency.py --root . --check
          python3 tools/validate/check_mirror_sync.py
          python3 tools/validate/generate_parity.py --check

      - name: Changelog gate (PR only)
        # The repo-changelog gate is staged-diff-based in pre-commit (empty in a CI
        # checkout). --base diffs the PR's commits against the target branch so it
        # enforces server-side too: a new skill / ts-cli bump / new shared file must
        # carry a CHANGELOG.md change in the same PR.
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          python3 tools/validate/suggest_repo_changelog.py --root . --check \
            --base "origin/${{ github.base_ref }}"

      - name: Run unit + validator tests
        run: pytest tools/ts-cli/tests/ tools/validate/tests/ -q
