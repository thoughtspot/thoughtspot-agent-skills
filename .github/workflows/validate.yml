name: validate

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly CVE sweep (Mondays 06:00 UTC). pip-audit only fires on push/PR today, so an
    # advisory published between merges goes undetected until the next PR — this catches it
    # on a cadence (audit finding 16.3). Complements the nudge-driven external sweep.
    - cron: "0 6 * * 1"

jobs:
  validate:
    # Full validator/test suite only makes sense on a code change — skip it on the weekly
    # cron (the scheduled run does the pip-audit-only job below instead).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so checkers that diff against HEAD/refs behave correctly.
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install test/runtime deps
        run: |
          pip install pytest pyyaml radon pip-audit
          pip install -e tools/ts-cli

      - name: Dependency vulnerability scan (pip-audit)
        # Audits the environment just installed above (ts-cli + its runtime deps:
        # requests, PyYAML, keyring, typer) against the PyPI/OSV advisory database.
        # Fails the job on any known vulnerability (angle 16.1 — nothing previously
        # prevented a vulnerable resolution from landing silently).
        run: pip-audit

      - name: Run validators (full-repo mode)
        run: |
          set -e
          # Smoke tests are intentionally excluded — they need live ThoughtSpot /
          # Snowflake credentials and run via scripts/pre-push.sh, not in CI.
          python3 tools/validate/check_secrets.py --root . --all
          python3 tools/validate/check_references.py --root .
          python3 tools/validate/check_patterns.py --root .
          python3 tools/validate/check_version_sync.py --root .
          python3 tools/validate/check_module_health.py --root .
          python3 tools/validate/check_file_size.py --root .
          python3 tools/validate/check_yaml.py --root .
          python3 tools/validate/check_sv_yaml.py --root .
          python3 tools/validate/check_tml.py --root .
          python3 tools/validate/check_consistency.py --root .
          python3 tools/validate/check_skill_versions.py --root .
          python3 tools/validate/check_smoke_tests.py --root .
          python3 tools/validate/check_skill_naming.py --root .
          python3 tools/validate/check_runtime_coverage.py --root .
          python3 tools/validate/check_open_items.py --root . --warn
          # Filesystem-state gates that previously ran ONLY in pre-commit (bypassable
          # via --no-verify with no server-side catch). They derive purely from repo
          # contents, so they work in a clean CI checkout.
          python3 tools/validate/check_coverage_matrix.py --root .
          python3 tools/validate/check_formula_catalog.py --root .
          python3 tools/validate/check_no_v1_endpoints.py --root .
          python3 tools/validate/check_no_inline_tml_gate.py --root .
          python3 tools/validate/check_skill_cli_usage.py --root .
          # 2026-07-03 audit-harvest validators (see .claude/rules/repo-audit.md).
          python3 tools/validate/check_no_inline_requests.py --root .
          python3 tools/validate/check_pagination_convention.py --root .
          python3 tools/validate/check_slash_command_refs.py --root .
          python3 tools/validate/check_orphan_references.py --root .
          # Needs ts_cli's own typer command tree (installed above) to cross-check
          # SKILL.md `--flag` references against the real, registered CLI options.
          python3 tools/validate/check_skill_flag_usage.py --root .
          # Presence gate: every shared mapping/schema must carry a currency anchor
          # (staleness is soft and never fails — only missing/malformed anchors do).
          python3 tools/validate/check_mapping_currency.py --root . --check
          python3 tools/validate/check_mirror_sync.py
          python3 tools/validate/generate_parity.py --check

      - name: Changelog gate (PR only)
        # The repo-changelog gate is staged-diff-based in pre-commit (empty in a CI
        # checkout). --base diffs the PR's commits against the target branch so it
        # enforces server-side too: a new skill / ts-cli bump / new shared file must
        # carry a CHANGELOG.md change in the same PR.
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          python3 tools/validate/suggest_repo_changelog.py --root . --check \
            --base "origin/${{ github.base_ref }}"

      - name: Run unit + validator tests
        # Three separate invocations: agents/cli/ts-object-model-erd/tests and
        # agents/databricks/tests are each their own bare "tests" package
        # (tests/__init__.py, no distinguishing parent package) — same as
        # tools/ts-cli/tests. Combining same-named "tests" packages in one pytest
        # invocation collides on conftest module registration
        # (ImportPathMismatchError / "Plugin already registered under a different
        # name"). tools/validate/tests has no __init__.py, so it can safely share
        # an invocation with tools/ts-cli/tests.
        run: |
          pytest tools/ts-cli/tests/ tools/validate/tests/ -q
          pytest agents/cli/ts-object-model-erd/tests/ -q
          pytest agents/databricks/tests/ -q

  # Weekly scheduled CVE sweep — pip-audit ONLY (no validators/tests). Keeps the existing
  # CVE gate time-driven as well as event-driven without re-running the whole suite on cron
  # (audit finding 16.3). The push/PR pip-audit step inside `validate` is unchanged.
  scheduled-audit:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install runtime deps + pip-audit
        run: |
          pip install pip-audit
          pip install -e tools/ts-cli

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit
