bundle:
  name: thoughtspot-skills

workspace:
  root_path: /Workspace/thoughtspot-skills

# Grant CAN_MANAGE to users or groups that need to deploy this bundle.
# The deploying identity (user or Service Principal) must be listed here
# OR have workspace-level permissions on the root_path above.
# Uncomment and edit the entries below:
#
# permissions:
#   - level: CAN_MANAGE
#     user_name: your-email@company.com
#   - level: CAN_MANAGE
#     service_principal_name: your-service-principal-name

sync:
  include:
    - "notebooks/**"
    - "skills/**"
    - "shared/**"
    - "../../shared/**"

resources:
  jobs:
    token_refresh:
      name: "ThoughtSpot Token Refresh"
      schedule:
        quartz_cron_expression: "0 0 */12 * * ?"
        timezone_id: UTC
      tasks:
        - task_key: refresh
          notebook_task:
            notebook_path: notebooks/token_refresh.py

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-3472b2da-8a4e.cloud.databricks.com
  prod:
    workspace:
      host: https://dbc-3472b2da-8a4e.cloud.databricks.com
