<title>Model ERD — Dunder Mifflin Sales &amp; Inventory</title>
<meta name="description" content="Interactive ERD render of a ThoughtSpot Model TML — layouts, focus, column modes, findings and RLS overlays. Proof-of-concept for ts-audit.">

<style>
  :root{
    --ground:#F6F7F9; --surface:#FFFFFF; --surface-2:#FBFCFD;
    --ink:#161B26; --muted:#6B7480; --hair:#E2E6EC; --hair-2:#EDF0F4;
    --accent:#1E6FA8; --accent-soft:#EAF2F8;
    --warn:#B5730A; --warn-soft:#FBF1DF;
    --crit:#C2382E; --crit-soft:#FBE9E7;
    --ok:#2E8B62; --ok-soft:#E6F3EC;
    --rls:#6B4FB8; --rls-soft:#F0ECF9;
    --dim-fill:#EEF0F3; --dim-stroke:#C8CFD8;
    --fact-fill:#EAF2F8; --fact-stroke:#1E6FA8;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--ground);
    display:grid;grid-template-rows:auto auto 1fr;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

  /* ---- top bar ---- */
  header{display:flex;align-items:center;gap:20px;padding:11px 20px;background:var(--surface);border-bottom:1px solid var(--hair);flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:2px;margin-right:auto}
  .eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .brand h1{margin:0;font-size:16px;font-weight:650;letter-spacing:-.01em}
  .stats{display:flex;gap:16px}
  .stat{display:flex;flex-direction:column;line-height:1.1}
  .stat b{font-size:16px;font-variant-numeric:tabular-nums;font-weight:650}
  .stat span{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
  .stat.crit b{color:var(--crit)} .stat.warn b{color:var(--warn)} .stat.rls b{color:var(--rls)}

  /* ---- controls bar ---- */
  .controls{display:flex;align-items:center;gap:18px;padding:8px 20px;background:var(--surface-2);border-bottom:1px solid var(--hair);flex-wrap:wrap}
  .ctl{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted)}
  .ctl label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:650;color:var(--muted)}
  select,.finder input{font-family:var(--sans);font-size:12px;color:var(--ink);background:var(--surface);
    border:1px solid var(--hair);border-radius:7px;padding:5px 8px;cursor:pointer}
  select:focus-visible,.finder input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .finder input{cursor:text;min-width:190px}
  .seg{display:inline-flex;border:1px solid var(--hair);border-radius:7px;overflow:hidden;background:var(--surface)}
  .seg button{border:0;background:transparent;font-size:12px;padding:5px 10px;cursor:pointer;color:var(--muted);border-right:1px solid var(--hair)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--accent);color:#fff}
  .minibtn{font-family:var(--sans);font-size:11.5px;color:var(--muted);background:var(--surface);border:1px solid var(--hair);border-radius:7px;padding:5px 9px;cursor:pointer}
  .minibtn:hover{border-color:var(--accent);color:var(--accent)}
  .minibtn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .saved-badge{font-size:10px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;color:var(--ok);display:none;align-items:center;gap:4px}
  .saved-badge.on{display:inline-flex}
  .saved-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ok)}
  .seg button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink);cursor:pointer;user-select:none}
  .toggle input{appearance:none;width:32px;height:18px;border-radius:99px;background:var(--hair);position:relative;cursor:pointer;transition:background .15s;flex:none}
  .toggle input:checked{background:var(--accent)}
  .toggle.rls input:checked{background:var(--rls)}
  .toggle input::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .toggle input:checked::after{transform:translateX(14px)}
  .toggle input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .spacer{margin-left:auto}

  main{display:grid;grid-template-columns:1fr 380px;min-height:0}
  .canvas-wrap{position:relative;overflow:hidden;background:radial-gradient(circle at 1px 1px,#DDE2E9 1px,transparent 0) 0 0/22px 22px,var(--ground)}
  svg{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
  svg.panning{cursor:grabbing}
  .hint{position:absolute;left:16px;bottom:14px;font-size:11px;color:var(--muted);background:rgba(255,255,255,.85);border:1px solid var(--hair);border-radius:7px;padding:6px 10px;pointer-events:none}
  .ctrls{position:absolute;right:16px;top:14px;display:flex;flex-direction:column;gap:6px}
  .ctrls button{width:32px;height:32px;border:1px solid var(--hair);background:var(--surface);border-radius:8px;font-size:16px;color:var(--ink);cursor:pointer;display:grid;place-items:center;box-shadow:0 1px 2px rgba(20,27,38,.05)}
  .ctrls button:hover{background:var(--surface-2);border-color:var(--accent)}
  .ctrls button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .node{cursor:grab;transition:opacity .25s}
  .node text{pointer-events:none}
  .edge-g{transition:opacity .25s}
  .ghost{opacity:.1}
  .nh{font-weight:650;font-size:12.5px}
  .nbadge{font-size:8.5px;letter-spacing:.08em;font-weight:700}
  .col-name{font-size:11px;font-family:var(--mono)}
  .col-key{fill:#8A93A0}
  @media (prefers-reduced-motion:reduce){.node,.edge-g{transition:none}}

  aside{background:var(--surface);border-left:1px solid var(--hair);overflow-y:auto;padding:20px}
  aside h2{margin:0 0 3px;font-size:14.5px;font-weight:650}
  aside .sub{font-size:11.5px;color:var(--muted);margin:0 0 14px;line-height:1.45}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:99px;border:1px solid}
  .pill.fact{color:var(--accent);background:var(--accent-soft);border-color:#BBD7E9}
  .pill.dim{color:var(--muted);background:var(--dim-fill);border-color:var(--dim-stroke)}
  .pill.rls{color:var(--rls);background:var(--rls-soft);border-color:#D5C9EE}
  .section-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:650;margin:18px 0 9px;display:flex;align-items:center;gap:8px}
  .section-label::after{content:"";flex:1;height:1px;background:var(--hair-2)}
  table.cols{width:100%;border-collapse:collapse;font-size:12px}
  table.cols td{padding:6px 4px;border-bottom:1px solid var(--hair-2);vertical-align:top}
  table.cols .c-name{font-family:var(--mono);font-size:11.5px}
  table.cols .c-key .c-name{color:#8A93A0}
  table.cols .c-type{text-align:right;white-space:nowrap}
  .tag{font-size:9px;letter-spacing:.04em;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:5px}
  .tag.m{color:var(--ok);background:var(--ok-soft)} .tag.a{color:var(--muted);background:var(--dim-fill)}
  .tag.f{color:var(--accent);background:var(--accent-soft)} .tag.k{color:#8A93A0;background:#EDEFF2}
  .fdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .fdot.crit{background:var(--crit)} .fdot.warn{background:var(--warn)} .fdot.info{background:var(--accent)}

  .finding{border:1px solid var(--hair);border-left-width:3px;border-radius:8px;padding:11px 12px;margin-bottom:10px;cursor:pointer;transition:box-shadow .12s}
  .finding:hover{box-shadow:0 2px 8px rgba(20,27,38,.07)}
  .finding:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .finding.crit{border-left-color:var(--crit)} .finding.warn{border-left-color:var(--warn)} .finding.info{border-left-color:var(--accent)}
  .finding .fhead{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .sev{font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:5px}
  .sev.crit{color:var(--crit);background:var(--crit-soft)} .sev.warn{color:var(--warn);background:var(--warn-soft)} .sev.info{color:var(--accent);background:var(--accent-soft)}
  .finding .check{font-size:9.5px;font-family:var(--mono);color:var(--muted);margin-left:auto}
  .finding .ftitle{font-size:12.5px;font-weight:600;line-height:1.35;margin-bottom:4px}
  .finding .ftarget{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .finding .fdetail,.finding .frec{display:none}
  .finding.open .fdetail{display:block;font-size:11.5px;color:#3C4453;line-height:1.5;margin-top:7px}
  .finding.open .frec{display:block;font-size:11.5px;line-height:1.5;margin-top:8px;padding:8px 10px;background:var(--surface-2);border-radius:6px}
  .frec b{color:var(--ink)}

  .rule{border:1px solid #D5C9EE;border-radius:8px;padding:11px 12px;margin-bottom:10px;background:var(--rls-soft)}
  .rule .rname{font-size:12.5px;font-weight:650;display:flex;align-items:center;gap:7px;margin-bottom:5px}
  .rule .rscope{font-size:10.5px;color:var(--rls);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:7px}
  .expr{font-family:var(--mono);font-size:11px;line-height:1.5;background:#1B2330;color:#D6DEEA;border-radius:7px;padding:9px 11px;overflow-x:auto;white-space:pre-wrap;word-break:break-word}
  .rule .expr{background:#251E3A;color:#E3DCF3}
  .affected{font-size:11px;color:#3C4453;line-height:1.5;margin-top:8px}
  .affected b{color:var(--rls)}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);background:var(--accent-soft);color:var(--accent);border:1px solid #BBD7E9;border-radius:99px;padding:3px 9px;margin:0 6px 6px 0}
  .chip button{border:0;background:none;color:var(--accent);cursor:pointer;font-size:13px;line-height:1;padding:0}
  .backlink{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;margin-bottom:14px;display:inline-flex;gap:5px;align-items:center}
  .backlink:hover{text-decoration:underline}
  .note{font-size:10.5px;color:var(--muted);line-height:1.5;margin-top:22px;padding-top:14px;border-top:1px dashed var(--hair)}
  .note b{color:var(--ink)}
</style>

<header>
  <div class="brand">
    <span class="eyebrow">ThoughtSpot Model · ERD</span>
    <h1>Dunder Mifflin Sales &amp; Inventory</h1>
  </div>
  <div class="stats">
    <div class="stat"><b id="s-tables">8</b><span>Tables</span></div>
    <div class="stat"><b id="s-joins">8</b><span>Joins</span></div>
    <div class="stat crit"><b id="s-crit">1</b><span>Critical</span></div>
    <div class="stat warn"><b id="s-warn">2</b><span>Warnings</span></div>
    <div class="stat rls"><b id="s-rls">2</b><span>RLS rules</span></div>
  </div>
</header>

<div class="controls">
  <div class="ctl"><label>Layout</label>
    <div class="seg" id="layout-seg">
      <button data-l="organic" class="on">Organic</button>
      <button data-l="star">Star</button>
      <button data-l="lr">Layered →</button>
      <button data-l="tb">Layered ↓</button>
    </div>
  </div>
  <label class="toggle" id="orth-wrap" title="Right-angle edge routing — layered views only" style="opacity:.4"><input type="checkbox" id="orth-toggle" disabled> Orthogonal</label>
  <span class="saved-badge" id="saved-badge" title="Manual positions saved for this layout">saved</span>
  <button class="minibtn" id="reset-pos" title="Restore auto-layout for this view">⟲ Reset positions</button>
  <div class="ctl"><label>Notation</label>
    <div class="seg" id="notation-seg">
      <button data-n="arrow" class="on" title="ThoughtSpot-style directional arrows">Arrow</button>
      <button data-n="crow" title="Crow's foot — shows cardinality">Crow's foot</button>
    </div>
  </div>
  <div class="ctl"><label>Columns</label>
    <select id="col-mode">
      <option value="collapsed">Collapsed</option>
      <option value="keys">Join keys</option>
      <option value="flagged">Flagged only</option>
      <option value="all" selected>All columns</option>
    </select>
  </div>
  <div class="ctl finder"><label for="finder">Find</label>
    <input id="finder" list="tablelist" placeholder="table name…" autocomplete="off">
    <datalist id="tablelist"></datalist>
  </div>
  <div class="spacer"></div>
  <label class="toggle"><input type="checkbox" id="findings-toggle" checked> Findings</label>
  <label class="toggle rls"><input type="checkbox" id="rls-toggle"> RLS</label>
  <label class="toggle rls"><input type="checkbox" id="rlsonly-toggle"> Secured subgraph</label>
</div>

<main>
  <div class="canvas-wrap">
    <svg id="svg" role="img" aria-label="Entity relationship diagram">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9AA4B1"/></marker>
        <marker id="arrow-hot" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#C2382E"/></marker>
        <marker id="arrow-rls" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6B4FB8"/></marker>
        <marker id="arrow-sel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1E6FA8"/></marker>
      </defs>
      <g id="viewport"><g id="edges"></g><g id="nodes"></g></g>
    </svg>
    <div class="ctrls">
      <button id="zoom-in" title="Zoom in" aria-label="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out" aria-label="Zoom out">−</button>
      <button id="zoom-fit" title="Fit to view" aria-label="Fit to view">⤢</button>
    </div>
    <div class="hint" id="hint">Click a table to focus · Shift-click to compare · drag to pan · scroll to zoom</div>
  </div>
  <aside id="inspector"></aside>
</main>

<script>
"use strict";
const MODEL={
  name:"Dunder Mifflin Sales & Inventory",
  description:"Sales transactions with product, customer, employee and inventory context. Two fact tables (orders, inventory) share the product and date dimensions.",
  tables:[
    {id:"DM_ORDER_DETAIL",kind:"fact",cols:[
      {name:"ORDER_ID",role:"ATTR",key:1,hidden:1},
      {name:"PRODUCT_ID",role:"ATTR",key:1,hidden:1},
      {name:"Quantity",role:"MEASURE",agg:"SUM"},
      {name:"Amount",role:"MEASURE",agg:"SUM"},
      {name:"Unit Price",role:"MEASURE",agg:"AVG"},
      {name:"Discount",role:"ATTR",flag:"info"},
      {name:"Category Quantity",role:"FORMULA",agg:"SUM"},
      {name:"Product to Category Contribution Ratio",role:"FORMULA",agg:"SUM",flag:"crit"},
    ]},
    {id:"DM_ORDER",kind:"fact",cols:[
      {name:"ORDER_ID",role:"ATTR",key:1,hidden:1},
      {name:"CUSTOMER_CODE",role:"ATTR",key:1,hidden:1},
      {name:"DATE_KEY",role:"ATTR",key:1,hidden:1},
      {name:"EMPLOYEE_ID",role:"ATTR",key:1,hidden:1},
      {name:"Order Id",role:"ATTR"},
      {name:"# Employees",role:"FORMULA",agg:"SUM",flag:"warn"},
    ]},
    {id:"DM_INVENTORY",kind:"fact",cols:[
      {name:"PRODUCT_ID",role:"ATTR",key:1,hidden:1},
      {name:"DATE_KEY",role:"ATTR",key:1,hidden:1},
      {name:"Inventory Balance",role:"FORMULA",agg:"SUM"},
    ]},
    {id:"DM_PRODUCT",kind:"dim",cols:[
      {name:"PRODUCT_ID",role:"ATTR",key:1},
      {name:"CATEGORY_ID",role:"ATTR",key:1,hidden:1},
      {name:"Product Name",role:"ATTR"},
      {name:"Product Description",role:"ATTR"},
    ]},
    {id:"DM_CATEGORY",kind:"dim",cols:[
      {name:"CATEGORY_ID",role:"ATTR",key:1,hidden:1},
      {name:"Product Category",role:"ATTR"},
    ]},
    {id:"DM_CUSTOMER",kind:"dim",rls:[
      {name:"Customer territory scope",scope:"All non-admin groups",
       expr:"[DM_CUSTOMER::STATE] IN ( ts_user_territories ( ) )"}],
     cols:[
      {name:"CUSTOMER_CODE",role:"ATTR",key:1,hidden:1},
      {name:"Customer Name",role:"ATTR"},
      {name:"Customer Code",role:"ATTR"},
      {name:"Customer State",role:"ATTR"},
      {name:"Customer Zipcode",role:"ATTR"},
    ]},
    {id:"DM_EMPLOYEE",kind:"dim",rls:[
      {name:"Reps see own records",scope:"Sales group",
       expr:"[DM_EMPLOYEE::EMPLOYEE_ID] = ts_user_id ( )"}],
     cols:[
      {name:"EMPLOYEE_ID",role:"ATTR",key:1,hidden:1},
      {name:"Employee",role:"FORMULA"},
    ]},
    {id:"DM_DATE_DIM",kind:"dim",cols:[
      {name:"DATE_KEY",role:"ATTR",key:1,hidden:1},
      {name:"Transaction Date",role:"ATTR"},
    ]},
  ],
  // card: source-to-target cardinality · origin: "table" (reusable, defined on the table TML) or "model" (defined inline in this model) · type: join type
  joins:[
    {from:"DM_ORDER_DETAIL",to:"DM_ORDER",name:"DM_ORDER_DETAIL_to_DM_ORDER",card:"MANY_TO_ONE",origin:"table",type:"INNER"},
    {from:"DM_ORDER_DETAIL",to:"DM_PRODUCT",name:"DM_ORDER_DETAIL_to_DM_PRODUCT",card:"MANY_TO_ONE",origin:"table",type:"INNER"},
    {from:"DM_ORDER",to:"DM_CUSTOMER",name:"DM_ORDER_to_DM_CUSTOMER",card:"MANY_TO_ONE",origin:"table",type:"LEFT_OUTER"},
    {from:"DM_ORDER",to:"DM_DATE_DIM",name:"DM_ORDER_to_DM_DATE_DIM",card:"MANY_TO_ONE",origin:"table",type:"INNER"},
    {from:"DM_ORDER",to:"DM_EMPLOYEE",name:"DM_ORDER_to_DM_EMPLOYEE",card:"MANY_TO_ONE",origin:"model",type:"LEFT_OUTER"},
    {from:"DM_PRODUCT",to:"DM_CATEGORY",name:"DM_PRODUCT_to_DM_CATEGORY",card:"MANY_TO_ONE",origin:"table",type:"INNER"},
    {from:"DM_INVENTORY",to:"DM_DATE_DIM",name:"DM_INVENTORY_to_DM_DATE_DIM",card:"MANY_TO_ONE",origin:"model",type:"INNER"},
    {from:"DM_INVENTORY",to:"DM_PRODUCT",name:"DM_INVENTORY_to_DM_PRODUCT",card:"MANY_TO_ONE",origin:"model",type:"INNER"},
  ],
  formulas:{
    "# Employees":"count ( [DM_ORDER::EMPLOYEE_ID] )",
    "Inventory Balance":"last_value ( sum ( [DM_INVENTORY::FILLED_INVENTORY] ) , query_groups ( ) , { [DM_DATE_DIM::date] } )",
    "Employee":"concat ( [DM_EMPLOYEE::LAST_NAME] , ', ' , [DM_EMPLOYEE::FIRST_NAME] )",
    "Category Quantity":"sum ( group_aggregate ( sum ( [DM_ORDER_DETAIL::QUANTITY] ) , { [DM_CATEGORY::CATEGORY_NAME] } , query_filters ( ) ) )",
    "Product to Category Contribution Ratio":"sum ( group_aggregate ( sum ( [DM_ORDER_DETAIL::QUANTITY] ) , { [DM_INVENTORY::PRODUCT_ID] } , query_filters ( ) ) ) / [Category Quantity]",
  },
  findings:[
    {id:"f1",sev:"crit",check:"D-DBLAGG",target:"DM_ORDER_DETAIL",title:"Possible double aggregation in Contribution Ratio",where:"formula · Product to Category Contribution Ratio",
     detail:"Nests group_aggregate(sum(QUANTITY)) grouped by DM_INVENTORY::PRODUCT_ID — a key on a different fact than the QUANTITY it sums (DM_ORDER_DETAIL). Aggregating one fact's measure across another fact's grain risks inflated totals.",
     rec:"Group by DM_PRODUCT::PRODUCT_ID (the shared dimension key), not DM_INVENTORY::PRODUCT_ID."},
    {id:"f2",sev:"warn",check:"H-FORMULA",target:"DM_ORDER",title:"“# Employees” counts rows, not distinct employees",where:"formula · # Employees",
     detail:"expr is count([DM_ORDER::EMPLOYEE_ID]) — a plain count over the orders fact, returning order rows with an employee, not distinct employees.",
     rec:"Use count_distinct([DM_ORDER::EMPLOYEE_ID])."},
    {id:"f3",sev:"warn",check:"D-FANOUT",target:"DM_PRODUCT",title:"Dimension shared by two fact tables",where:"DM_PRODUCT · joined by DM_ORDER_DETAIL and DM_INVENTORY",
     detail:"DM_PRODUCT (and DM_DATE_DIM) are each joined from two facts. Combining measures from both facts through a shared dimension can fan-out rows.",
     rec:"Validate a query mixing Quantity (orders) and Inventory Balance (inventory) by Product against the warehouse."},
    {id:"f4",sev:"info",check:"D-TYPE",target:"DM_ORDER_DETAIL",title:"Numeric field modelled as attribute",where:"column · Discount",
     detail:"Discount holds a numeric percentage but is typed ATTRIBUTE with no aggregation.",
     rec:"Confirm intended use; set column_type/aggregation accordingly."},
  ],
};

const SEV_RANK={crit:3,warn:2,info:1};
const tableById={}; MODEL.tables.forEach(t=>tableById[t.id]=t);
const findingsByTable={}; MODEL.findings.forEach(f=>(findingsByTable[f.target]=findingsByTable[f.target]||[]).push(f));
function worstSev(id){let w=null;(findingsByTable[id]||[]).forEach(f=>{if(!w||SEV_RANK[f.sev]>SEV_RANK[w])w=f.sev;});return w;}
const HOT_EDGES=new Set(["DM_ORDER_DETAIL_to_DM_PRODUCT","DM_INVENTORY_to_DM_PRODUCT"]);

// adjacency (undirected for focus/path; directed for layered + rls propagation)
const adj={}, radj={}, undir={};
MODEL.tables.forEach(t=>{adj[t.id]=[];radj[t.id]=[];undir[t.id]=[];});
MODEL.joins.forEach(j=>{adj[j.from].push(j.to);radj[j.to].push(j.from);undir[j.from].push(j.to);undir[j.to].push(j.from);});

// tables affected by RLS on a secured dim = all that can reach it following from->to
function ancestors(id){const seen=new Set(),stack=[id];while(stack.length){const n=stack.pop();radj[n].forEach(p=>{if(!seen.has(p)){seen.add(p);stack.push(p);}});}return seen;}
const securedTables=MODEL.tables.filter(t=>t.rls).map(t=>t.id);
const rlsAffected=new Set();
securedTables.forEach(s=>ancestors(s).forEach(a=>rlsAffected.add(a)));

const NS="http://www.w3.org/2000/svg";

const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;

const ROW_H=20,HEAD_H=30,PAD=10,NODE_W=200;

function visibleCols(t){
  if(colMode==="collapsed")return [];
  if(colMode==="keys")return t.cols.filter(c=>c.key);
  if(colMode==="flagged")return t.cols.filter(c=>c.flag);
  return t.cols.filter(c=>!c.hidden); // 'all' hides FK helper cols, shows the rest
}
function nodeHeight(t){const n=visibleCols(t).length;return HEAD_H+(n?n*ROW_H+PAD:8);}

// ---- deterministic PRNG ----
let _seed=20260627; const rnd=()=>{_seed=(_seed*1664525+1013904223)>>>0;return _seed/4294967296;};

const nodes=MODEL.tables.map((t,i)=>{const a=i/MODEL.tables.length*Math.PI*2;
  return {t,w:NODE_W,h:nodeHeight(t),x:480+Math.cos(a)*240+(rnd()-.5)*40,y:340+Math.sin(a)*200+(rnd()-.5)*40};});
const nodeById={};nodes.forEach(n=>nodeById[n.t.id]=n);
const edges=MODEL.joins.map(j=>({j,s:nodeById[j.from],t:nodeById[j.to]}));

// ---- LAYOUTS (return {id:{x,y}}) ----
function computeOrganic(){
  // reset to seeded ring then relax
  nodes.forEach((n,i)=>{const a=i/nodes.length*Math.PI*2;n.x=480+Math.cos(a)*240+(rnd()-.5)*40;n.y=340+Math.sin(a)*200+(rnd()-.5)*40;});
  for(let it=0;it<420;it++){const cool=1-it/420;
    for(let i=0;i<nodes.length;i++)for(let k=i+1;k<nodes.length;k++){const a=nodes[i],b=nodes[k];
      let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2),rep=95000/d2;
      a.x+=dx/d*rep*cool;a.y+=dy/d*rep*cool;b.x-=dx/d*rep*cool;b.y-=dy/d*rep*cool;}
    edges.forEach(e=>{let dx=e.t.x-e.s.x,dy=e.t.y-e.s.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-250)*.015*cool;
      e.s.x+=dx/d*f;e.s.y+=dy/d*f;e.t.x-=dx/d*f;e.t.y-=dy/d*f;});
    nodes.forEach(n=>{n.x+=(480-n.x)*.004*cool;n.y+=(340-n.y)*.004*cool;});}
  const m={};nodes.forEach(n=>m[n.t.id]={x:n.x,y:n.y});return m;
}
function computeStar(){
  const cx=520,cy=360,m={};
  const facts=MODEL.tables.filter(t=>t.kind==="fact"), dims=MODEL.tables.filter(t=>t.kind==="dim");
  const factAngle={};
  facts.forEach((f,i)=>{const a=facts.length===1?0:(i/facts.length*Math.PI*2-Math.PI/2);factAngle[f.id]=a;
    const r=facts.length===1?0:150; m[f.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r};});
  // dims connected to facts: average fact angle; dims connected only to dims: pushed further
  const dimAngle={};
  dims.forEach(d=>{const fn=undir[d.id].filter(x=>tableById[x].kind==="fact");
    if(fn.length){let sx=0,sy=0;fn.forEach(f=>{sx+=Math.cos(factAngle[f]);sy+=Math.sin(factAngle[f]);});dimAngle[d.id]=Math.atan2(sy,sx);}});
  dims.forEach((d,i)=>{
    let a=dimAngle[d.id];
    if(a===undefined){const dn=undir[d.id].filter(x=>dimAngle[x]!==undefined);a=dn.length?dimAngle[dn[0]]:i/dims.length*Math.PI*2;}
    const onlyDim=undir[d.id].every(x=>tableById[x].kind==="dim");
    const r=onlyDim?560:380; const jitter=(i%2?1:-1)*0.10;
    m[d.id]={x:cx+Math.cos(a+jitter)*r,y:cy+Math.sin(a+jitter)*r};});
  return m;
}
function computeLayered(dir){
  const rank={};MODEL.tables.forEach(t=>rank[t.id]=0);
  for(let i=0;i<MODEL.tables.length;i++)MODEL.joins.forEach(j=>{if(rank[j.to]<rank[j.from]+1)rank[j.to]=rank[j.from]+1;});
  const byRank={};MODEL.tables.forEach(t=>{(byRank[rank[t.id]]=byRank[rank[t.id]]||[]).push(t.id);});
  const colGap=300,rowGap=140,m={};
  Object.keys(byRank).forEach(r=>{const ids=byRank[r];const span=(ids.length-1)*rowGap;
    ids.forEach((id,i)=>{const along=r*colGap+120, across=i*rowGap-span/2+360;
      m[id]=dir==="lr"?{x:along,y:across}:{x:across,y:along};});});
  return m;
}
let layoutCache={organic:computeOrganic()};
function getLayout(name){
  if(layoutCache[name])return layoutCache[name];
  layoutCache[name]=name==="star"?computeStar():computeLayered(name);
  return layoutCache[name];
}

// ---- tween ----
function tweenTo(targets){
  if(reduce){nodes.forEach(n=>{n.x=targets[n.t.id].x;n.y=targets[n.t.id].y;});renderAll();fit();return;}
  const from=nodes.map(n=>({x:n.x,y:n.y}));let f=0;const F=26;
  (function step(){f++;const e=f/F,k=e<.5?2*e*e:1-Math.pow(-2*e+2,2)/2;
    nodes.forEach((n,i)=>{n.x=from[i].x+(targets[n.t.id].x-from[i].x)*k;n.y=from[i].y+(targets[n.t.id].y-from[i].y)*k;});
    renderNodes();renderEdges();
    if(f<F)requestAnimationFrame(step);else fit();})();
}
function setLayout(name){layoutName=name;
  document.querySelectorAll("#layout-seg button").forEach(b=>b.classList.toggle("on",b.dataset.l===name));
  const layered=name==="lr"||name==="tb";
  tOrth.disabled=!layered;$("orth-wrap").style.opacity=layered?1:.4;
  updateSavedBadge();
  tweenTo(hasAll(savedPos[name])?savedPos[name]:getLayout(name));}

// ---- focus / path ----
function focusGroup(){ // ids to keep vivid
  if(rlsOnly){const k=new Set(securedTables);rlsAffected.forEach(x=>k.add(x));return k;}
  if(!focusSet.length)return null;
  const keep=new Set(focusSet);
  focusSet.forEach(id=>undir[id].forEach(n=>keep.add(n)));
  return keep;
}
function shortestPath(a,b){
  const prev={},q=[a],seen=new Set([a]);
  while(q.length){const n=q.shift();if(n===b)break;undir[n].forEach(m=>{if(!seen.has(m)){seen.add(m);prev[m]=n;q.push(m);}});}
  if(!seen.has(b))return [];const path=[b];let c=b;while(c!==a){c=prev[c];if(c===undefined)return [];path.unshift(c);}return path;
}
function pathEdges(){
  if(focusSet.length<2)return new Set();
  const set=new Set();
  for(let i=0;i<focusSet.length-1;i++){const p=shortestPath(focusSet[i],focusSet[i+1]);
    for(let k=0;k<p.length-1;k++){MODEL.joins.forEach(j=>{if((j.from===p[k]&&j.to===p[k+1])||(j.from===p[k+1]&&j.to===p[k]))set.add(j.name);});}}
  return set;
}

const NS_el=(tag,attrs,parent)=>{const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);if(parent)parent.appendChild(e);return e;};
const center=n=>({x:n.x+n.w/2,y:n.y+n.h/2});
function border(n,toward){const c=center(n),dx=toward.x-c.x,dy=toward.y-c.y,hw=n.w/2,hh=n.h/2;
  const s=Math.min(dx===0?1e9:hw/Math.abs(dx),dy===0?1e9:hh/Math.abs(dy));return {x:c.x+dx*s,y:c.y+dy*s};}

// orthogonal lane assignment: separate vertical (lr) / horizontal (tb) runs that share a channel
function computeLanes(){
  const buckets={};
  edges.forEach(e=>{e.s.h=nodeHeight(e.s.t);e.t.h=nodeHeight(e.t.t);
    const base=layoutName==="lr"?(e.s.x+e.s.w+e.t.x)/2:(e.s.y+e.s.h+e.t.y)/2;
    const key=Math.round(base/6);(buckets[key]=buckets[key]||[]).push(e);});
  Object.values(buckets).forEach(arr=>{
    arr.sort((a,b)=>layoutName==="lr"?(a.s.y-b.s.y):(a.s.x-b.s.x));
    arr.forEach((e,i)=>e.lane=(i-(arr.length-1)/2)*20);});
}
function orthPath(e){
  const s=e.s,t=e.t;
  if(layoutName==="lr"){
    const x1=s.x+s.w,y1=s.y+s.h/2,x2=t.x,y2=t.y+t.h/2;
    const mx=(x1+x2)/2+(e.lane||0);
    return {d:`M${x1},${y1} H${mx} V${y2} H${x2}`,lx:mx,ly:(y1+y2)/2};
  }else{
    const x1=s.x+s.w/2,y1=s.y+s.h,x2=t.x+t.w/2,y2=t.y;
    const my=(y1+y2)/2+(e.lane||0);
    return {d:`M${x1},${y1} V${my} H${x2} V${y2}`,lx:(x1+x2)/2,ly:my};
  }
}
function edgeGeom(e,orth){
  const s=e.s,t=e.t;
  if(orth&&layoutName==="lr"){const sp={x:s.x+s.w,y:s.y+s.h/2},tp={x:t.x,y:t.y+t.h/2},mx=(sp.x+tp.x)/2+(e.lane||0);
    return {sp,tp,sdir:{x:1,y:0},tdir:{x:-1,y:0},d:`M${sp.x},${sp.y} H${mx} V${tp.y} H${tp.x}`,mx,my:(sp.y+tp.y)/2};}
  if(orth&&layoutName==="tb"){const sp={x:s.x+s.w/2,y:s.y+s.h},tp={x:t.x+t.w/2,y:t.y},my=(sp.y+tp.y)/2+(e.lane||0);
    return {sp,tp,sdir:{x:0,y:1},tdir:{x:0,y:-1},d:`M${sp.x},${sp.y} V${my} H${tp.x} V${tp.y}`,mx:(sp.x+tp.x)/2,my};}
  const sp=border(s,center(t)),tp=border(t,center(s)),len=Math.hypot(tp.x-sp.x,tp.y-sp.y)||1;
  const sdir={x:(tp.x-sp.x)/len,y:(tp.y-sp.y)/len};
  return {sp,tp,sdir,tdir:{x:-sdir.x,y:-sdir.y},d:`M${sp.x},${sp.y} L${tp.x},${tp.y}`,mx:(sp.x+tp.x)/2,my:(sp.y+tp.y)/2};
}
function drawCard(g,p,dir,many,color){const perp={x:-dir.y,y:dir.x};
  if(many){const tip={x:p.x+dir.x*15,y:p.y+dir.y*15};[6,0,-6].forEach(o=>NS_el("line",{x1:tip.x,y1:tip.y,x2:p.x+perp.x*o,y2:p.y+perp.y*o,stroke:color,"stroke-width":1.5,"stroke-linecap":"round"},g));}
  else{const c={x:p.x+dir.x*10,y:p.y+dir.y*10};NS_el("line",{x1:c.x+perp.x*6,y1:c.y+perp.y*6,x2:c.x-perp.x*6,y2:c.y-perp.y*6,stroke:color,"stroke-width":1.7,"stroke-linecap":"round"},g);}}
function originBadge(g,x,y,origin){const m=origin==="model";
  NS_el("rect",{x:x-7,y:y-7,width:14,height:14,rx:4,fill:m?"#1E6FA8":"#EDEFF2",stroke:m?"#1E6FA8":"#C8CFD8","stroke-width":1},g);
  NS_el("text",{x,y:y+3.4,"text-anchor":"middle","font-size":9,"font-weight":700,fill:m?"#fff":"#6B7480"},g).textContent=m?"M":"T";}
function renderEdges(){
  gEdges.innerHTML="";
  const showF=tFind.checked,showR=tRls.checked||rlsOnly,keep=focusGroup(),pe=pathEdges();
  const orth=tOrth.checked&&(layoutName==="lr"||layoutName==="tb");
  const crow=notation==="crow";
  if(orth)computeLanes();
  edges.forEach(e=>{
    e.s.h=nodeHeight(e.s.t);e.t.h=nodeHeight(e.t.t);
    const G=edgeGeom(e,orth);
    const hot=showF&&HOT_EDGES.has(e.j.name);
    const rlsEdge=showR&&securedTables.includes(e.j.to);
    const onPath=pe.has(e.j.name);
    const sel=selected&&selected.type==="edge"&&selected.id===e.j.name;
    const ghost=keep&&!(keep.has(e.j.from)&&keep.has(e.j.to));
    let stroke="#9AA4B1",sw=1.6,dash="0",mk="url(#arrow)";
    if(rlsEdge){stroke="#6B4FB8";sw=2.1;dash="5 3";mk="url(#arrow-rls)";}
    if(hot){stroke="#C2382E";sw=2.4;dash="6 4";mk="url(#arrow-hot)";}
    if(onPath||sel){stroke="#1E6FA8";sw=3;dash="0";mk="url(#arrow-sel)";}
    const g=NS_el("g",{class:"edge-g"+(ghost?" ghost":""),style:"cursor:pointer"},gEdges);
    NS_el("path",{class:"edge",fill:"none",d:G.d,stroke,"stroke-width":sw,"stroke-dasharray":dash,"marker-end":crow?"none":mk,"stroke-linejoin":"round"},g);
    NS_el("path",{d:G.d,stroke:"transparent","stroke-width":16,fill:"none"},g);
    if(crow){const[sc,tc]=(e.j.card||"MANY_TO_ONE").split("_TO_");
      drawCard(g,G.sp,G.sdir,sc==="MANY",stroke);drawCard(g,G.tp,G.tdir,tc==="MANY",stroke);}
    if(rlsEdge)NS_el("text",{x:G.mx,y:G.my+4,"text-anchor":"middle","font-size":12},g).textContent="🔒";
    else originBadge(g,G.mx,G.my,e.j.origin||"table");
    g.addEventListener("click",ev=>{ev.stopPropagation();selectEdge(e.j.name);});
  });
}

function renderNodes(){
  gNodes.innerHTML="";
  const showF=tFind.checked,showR=tRls.checked||rlsOnly,keep=focusGroup();
  nodes.forEach(n=>{
    const t=n.t,isFact=t.kind==="fact";n.h=nodeHeight(t);
    const sev=showF?worstSev(t.id):null;
    const secured=showR&&t.rls,affected=showR&&!t.rls&&rlsAffected.has(t.id);
    const inFocus=focusSet.includes(t.id);
    const ghost=keep&&!keep.has(t.id);
    const g=NS_el("g",{class:"node"+(ghost?" ghost":""),transform:`translate(${n.x},${n.y})`},gNodes);

    let stroke=isFact?"#1E6FA8":"#C8CFD8",sw=isFact?1.6:1.2;
    if(secured){stroke="#6B4FB8";sw=2.2;} else if(affected){stroke="#A88FD8";sw=1.6;}
    if(sev==="crit"){stroke="#C2382E";sw=2.2;} else if(sev==="warn"){stroke="#B5730A";sw=2;}
    if(inFocus){stroke="#1E6FA8";sw=2.8;}
    let fill=secured?"#FBFAFE":affected?"#FCFBFE":"#fff";

    NS_el("rect",{x:0,y:0,width:n.w,height:n.h,rx:10,fill,stroke,"stroke-width":sw,style:"filter:drop-shadow(0 2px 5px rgba(20,27,38,.08))"},g);
    const hbg=secured?"#F0ECF9":isFact?"#EAF2F8":"#EEF0F3";
    NS_el("rect",{x:0,y:0,width:n.w,height:HEAD_H,rx:10,fill:hbg},g);
    NS_el("rect",{x:0,y:HEAD_H-10,width:n.w,height:10,fill:hbg},g);
    NS_el("line",{x1:0,y1:HEAD_H,x2:n.w,y2:HEAD_H,stroke:"#E2E6EC","stroke-width":1},g);

    const nh=NS_el("text",{class:"nh",x:12,y:20,fill:"#161B26"},g);nh.textContent=t.id;
    let bx=n.w-10;
    if(secured){const sh=NS_el("text",{x:bx-2,y:20,"text-anchor":"end","font-size":13},g);sh.textContent="🔒";bx-=22;}
    const bw=isFact?30:26;
    NS_el("rect",{x:bx-bw,y:9,width:bw,height:14,rx:4,fill:isFact?"#1E6FA8":"#C8CFD8"},g);
    const bd=NS_el("text",{class:"nbadge",x:bx-bw/2,y:19,"text-anchor":"middle",fill:isFact?"#fff":"#5A626E"},g);bd.textContent=isFact?"FACT":"DIM";

    const cols=visibleCols(t);
    cols.forEach((c,i)=>{const y=HEAD_H+i*ROW_H;
      const cn=NS_el("text",{class:"col-name"+(c.key?" col-key":""),x:12,y:y+15,fill:c.key?"#8A93A0":"#2A3140"},g);
      const nm=c.name.length>22?c.name.slice(0,21)+"…":c.name;cn.textContent=(c.key?"🔑 ":"")+nm;
      let badge=c.role==="MEASURE"?"#":c.role==="FORMULA"?"ƒ":c.key?"":"·";
      let bc=c.role==="MEASURE"?"#2E8B62":c.role==="FORMULA"?"#1E6FA8":"#9AA4B1";
      if(c.flag&&showF){badge=c.flag==="crit"?"●":"●";bc=c.flag==="crit"?"#C2382E":c.flag==="warn"?"#B5730A":"#1E6FA8";}
      NS_el("text",{x:n.w-12,y:y+15,"text-anchor":"end","font-size":11,"font-family":"var(--mono)","font-weight":700,fill:bc},g).textContent=badge;});

    enableDrag(g,n);
    g.addEventListener("click",ev=>{ev.stopPropagation();selectTable(t.id,ev.shiftKey||ev.metaKey||ev.ctrlKey);});

function renderAll(){renderEdges();renderNodes();}

// ---- pan / zoom ----
let view={x:0,y:0,k:1};
const applyView=()=>vp.setAttribute("transform",`translate(${view.x},${view.y}) scale(${view.k})`);
function screenToWorld(cx,cy){const r=svg.getBoundingClientRect();return {x:(cx-r.left-view.x)/view.k,y:(cy-r.top-view.y)/view.k};}
function fit(){let a=1e9,b=1e9,c=-1e9,d=-1e9;nodes.forEach(n=>{n.h=nodeHeight(n.t);a=Math.min(a,n.x);b=Math.min(b,n.y);c=Math.max(c,n.x+n.w);d=Math.max(d,n.y+n.h);});
  const pad=70,r=svg.getBoundingClientRect(),w=c-a+pad*2,h=d-b+pad*2;
  view.k=Math.min(r.width/w,r.height/h,1.35);view.x=(r.width-(c+a)*view.k)/2;view.y=(r.height-(d+b)*view.k)/2;applyView();}
function centerOn(n){const r=svg.getBoundingClientRect();view.x=r.width/2-(n.x+n.w/2)*view.k;view.y=r.height/2-(n.y+n.h/2)*view.k;applyView();}

let panning=false,panStart=null;
svg.addEventListener("pointerdown",e=>{if(e.target.closest(".node")||e.target.closest(".edge-g"))return;
  panning=true;panStart={x:e.clientX-view.x,y:e.clientY-view.y};svg.classList.add("panning");svg.setPointerCapture(e.pointerId);});
svg.addEventListener("pointermove",e=>{if(!panning)return;view.x=e.clientX-panStart.x;view.y=e.clientY-panStart.y;applyView();});
svg.addEventListener("pointerup",()=>{panning=false;svg.classList.remove("panning");});
svg.addEventListener("pointercancel",()=>{panning=false;svg.classList.remove("panning");});
svg.addEventListener("click",e=>{if(!e.target.closest(".node")&&!e.target.closest(".edge-g")){focusSet=[];selected=null;renderAll();showOverview();}});
svg.addEventListener("wheel",e=>{e.preventDefault();const r=svg.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const wx=(mx-view.x)/view.k,wy=(my-view.y)/view.k,f=e.deltaY<0?1.12:1/1.12;
  view.k=Math.max(.25,Math.min(2.4,view.k*f));view.x=mx-wx*view.k;view.y=my-wy*view.k;applyView();},{passive:false});
$("zoom-in").onclick=()=>{view.k=Math.min(2.4,view.k*1.18);applyView();};
$("zoom-out").onclick=()=>{view.k=Math.max(.25,view.k/1.18);applyView();};
$("zoom-fit").onclick=()=>{focusSet=[];renderAll();fit();};

function enableDrag(g,n){let dragging=false,off=null,moved=false;
  g.addEventListener("pointerdown",e=>{dragging=true;moved=false;const w=screenToWorld(e.clientX,e.clientY);off={x:w.x-n.x,y:w.y-n.y};g.setPointerCapture(e.pointerId);g.style.cursor="grabbing";e.stopPropagation();});
  g.addEventListener("pointermove",e=>{if(!dragging)return;moved=true;const w=screenToWorld(e.clientX,e.clientY);n.x=w.x-off.x;n.y=w.y-off.y;g.setAttribute("transform",`translate(${n.x},${n.y})`);renderEdges();});
  g.addEventListener("pointerup",()=>{dragging=false;g.style.cursor="grab";if(moved)captureLayout();});
  g.addEventListener("pointercancel",()=>{dragging=false;g.style.cursor="grab";});
}

// ---- selection / inspector ----
function selectTable(id,additive){
  if(additive){const i=focusSet.indexOf(id);if(i>=0)focusSet.splice(i,1);else focusSet.push(id);}
  else focusSet=[id];
  selected={type:"table",id};renderAll();
  if(focusSet.length>1)showCompare();else if(focusSet.length===1)showTable(focusSet[0]);else showOverview();
}
function selectEdge(name){selected={type:"edge",id:name};renderAll();showEdge(name);}

const ROLE_TAG={MEASURE:["m","measure"],ATTR:["a","attribute"],FORMULA:["f","formula"]};
const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

function findingCard(x){return `<div class="finding ${x.sev}" tabindex="0" data-target="${x.target}">
  <div class="fhead"><span class="sev ${x.sev}">${x.sev==="crit"?"Critical":x.sev==="warn"?"Warning":"Info"}</span><span class="check">${esc(x.check)}</span></div>
  <div class="ftitle">${esc(x.title)}</div><div class="ftarget">${esc(x.where)}</div>
  <div class="fdetail">${esc(x.detail)}</div><div class="frec"><b>Fix.</b> ${esc(x.rec)}</div></div>`;}
function ruleCard(r,affectedList){return `<div class="rule"><div class="rname">🔒 ${esc(r.name)}</div>
  <div class="rscope">${esc(r.scope)}</div><div class="expr">${esc(r.expr)}</div>
  ${affectedList?`<div class="affected">Propagates through joins to <b>${affectedList.map(esc).join(", ")}</b>.</div>`:""}</div>`;}
function wireFindings(){inspector.querySelectorAll(".finding").forEach(c=>{const act=()=>{c.classList.toggle("open");const t=c.dataset.target;if(tableById[t])selectTable(t,false);};
  c.addEventListener("click",act);c.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();act();}});});}

function showOverview(){
  let h=`<h2>${esc(MODEL.name)}</h2><p class="sub">${esc(MODEL.description)}</p>
    <div class="section-label">Findings (${MODEL.findings.length})</div>`;
  MODEL.findings.forEach(x=>h+=findingCard(x));
  h+=`<div class="section-label">Row-level security (${securedTables.length})</div>`;
  MODEL.tables.filter(t=>t.rls).forEach(t=>{const aff=[...ancestors(t.id)];h+=`<div style="font-size:11.5px;font-weight:600;margin-bottom:6px;font-family:var(--mono)">${esc(t.id)}</div>`+t.rls.map(r=>ruleCard(r,aff)).join("");});
  h+=`<div class="section-label">Reading the joins</div>
    <p class="sub">Each join carries a midpoint badge: <b style="background:#1E6FA8;color:#fff;border-radius:3px;padding:1px 5px;font-family:var(--mono)">M</b> = model-local (defined in this model only), <b style="background:#EDEFF2;color:#6B7480;border-radius:3px;padding:1px 5px;font-family:var(--mono)">T</b> = table-level (reusable, can ripple to other models). Switch <b>Notation</b> to <b>Crow's foot</b> to read cardinality (many ✸ vs one ┃) instead of TS-style arrows. Click any join for its type, cardinality and definition.</p>`;
  h+=`<div class="note"><b>Proof-of-concept.</b> Rendered from a real Model TML. Layout, focus, column modes,
    findings and RLS overlays all run client-side in one self-contained file — opens in any browser, no server.
    In ts-audit this is emitted into <span style="font-family:var(--mono)">audit_report.html</span>;
    findings come from <span style="font-family:var(--mono)">analyzer.py</span>. RLS rules shown here are illustrative.</div>`;
  inspector.innerHTML=h;wireFindings();inspector.scrollTop=0;
}
function showTable(id){
  const t=tableById[id],conns=MODEL.joins.filter(j=>j.from===id||j.to===id),fs=findingsByTable[id]||[];
  let h=`<button class="backlink" id="back">← Overview</button><h2>${esc(t.id)}</h2>
    <div style="margin:2px 0 14px;display:flex;gap:6px;flex-wrap:wrap"><span class="pill ${t.kind}">${t.kind==="fact"?"Fact table":"Dimension"}</span>
    ${t.rls?'<span class="pill rls">🔒 Secured</span>':rlsAffected.has(id)?'<span class="pill rls">RLS inherited</span>':""}</div>
    <div class="section-label">Columns (${t.cols.length})</div><table class="cols">`;
  t.cols.forEach(c=>{const[cls,label]=ROLE_TAG[c.role];const meta=c.key?"join key":(c.agg?`${label} · ${c.agg}`:label);
    h+=`<tr class="${c.key?"c-key":""}"><td class="c-name">${c.flag?`<span class="fdot ${c.flag}"></span>`:""}${esc(c.name)}</td>
      <td class="c-type"><span class="tag ${c.key?"k":cls}">${esc(meta)}</span></td></tr>`;});
  h+=`</table>`;
  const fcols=t.cols.filter(c=>c.role==="FORMULA"&&MODEL.formulas[c.name]);
  if(fcols.length){h+=`<div class="section-label">Formulas</div>`;fcols.forEach(c=>h+=`<div style="font-size:11.5px;font-weight:600;margin:0 0 5px">${esc(c.name)}</div><div class="expr">${esc(MODEL.formulas[c.name])}</div>`);}
  if(t.rls){h+=`<div class="section-label">RLS rules</div>`;t.rls.forEach(r=>h+=ruleCard(r,[...ancestors(id)]));}
  else if(rlsAffected.has(id)){const src=securedTables.filter(s=>ancestors(s).has(id));
    h+=`<div class="section-label">Inherited RLS</div><p class="sub">Queries on this table are constrained by RLS on <b style="color:var(--rls)">${src.map(esc).join(", ")}</b> via joins.</p>`;}
  h+=`<div class="section-label">Joins (${conns.length})</div>`;
  conns.forEach(j=>{const other=j.from===id?j.to:j.from,dir=j.from===id?"→":"←";
    h+=`<div style="font-size:12px;font-family:var(--mono);padding:5px 0;border-bottom:1px solid var(--hair-2);cursor:pointer" data-jump="${esc(j.name)}">${dir} ${esc(other)}</div>`;});
  if(fs.length){h+=`<div class="section-label">Findings (${fs.length})</div>`;fs.forEach(x=>h+=findingCard(x));}
  h+=`<p class="note">Tip: <b>Shift-click</b> another table to compare and trace the join path between them.</p>`;
  inspector.innerHTML=h;$("back").onclick=()=>{focusSet=[];selected=null;renderAll();showOverview();};
  inspector.querySelectorAll("[data-jump]").forEach(e=>e.onclick=()=>selectEdge(e.dataset.jump));wireFindings();inspector.scrollTop=0;
}
function showCompare(){
  let h=`<button class="backlink" id="back">← Overview</button><h2>Comparing ${focusSet.length} tables</h2>
    <p class="sub">Focused tables and their direct neighbours stay vivid; the join path between them is highlighted in blue.</p>
    <div>${focusSet.map(id=>`<span class="chip">${esc(id)} <button data-rm="${esc(id)}" aria-label="remove">×</button></span>`).join("")}</div>`;
  const p=focusSet.length===2?shortestPath(focusSet[0],focusSet[1]):null;
  if(p&&p.length){h+=`<div class="section-label">Join path</div><div style="font-size:12px;font-family:var(--mono);line-height:1.9">${p.map(esc).join(" <span style='color:var(--accent)'>→</span> ")}</div>`;}
  else if(focusSet.length===2){h+=`<p class="sub">No join path connects these two tables.</p>`;}
  inspector.innerHTML=h;$("back").onclick=()=>{focusSet=[];selected=null;renderAll();showOverview();};
  inspector.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>selectTable(b.dataset.rm,true));inspector.scrollTop=0;
}
function showEdge(name){const j=MODEL.joins.find(x=>x.name===name),hot=HOT_EDGES.has(name),secured=securedTables.includes(j.to);
  const cardTxt={MANY_TO_ONE:"Many-to-one · N:1",ONE_TO_MANY:"One-to-many · 1:N",ONE_TO_ONE:"One-to-one · 1:1",MANY_TO_MANY:"Many-to-many · N:N"}[j.card]||j.card;
  const isModel=j.origin==="model";
  let h=`<button class="backlink" id="back">← Overview</button><h2>Join</h2>
    <p class="sub" style="font-family:var(--mono);color:var(--ink)">${esc(j.from)} → ${esc(j.to)}</p>
    <div class="section-label">Definition</div>
    <table class="cols">
      <tr><td>Cardinality</td><td class="c-type"><span class="tag a">${esc(cardTxt)}</span></td></tr>
      <tr><td>Join type</td><td class="c-type"><span class="tag a">${esc((j.type||"").replace("_"," "))}</span></td></tr>
      <tr><td>Defined</td><td class="c-type"><span class="tag ${isModel?"f":"k"}">${isModel?"Model-local":"Table-level"}</span></td></tr>
    </table>
    <p class="sub" style="margin-top:9px">${isModel
      ?`<b style="color:var(--accent)">Model-local</b> — defined inline in this model only. Editing it affects just this model.`
      :`<b>Table-level</b> — defined on the <span style="font-family:var(--mono)">${esc(j.from)}</span> table TML and <b>reusable across every model</b> that uses it. Changing or removing it can ripple to other models.`}</p>
    <div class="section-label">Reference</div><div class="expr">${esc(j.name)}</div>`;
  if(hot)h+=`<div class="section-label">Flagged</div>`+findingCard(MODEL.findings.find(f=>f.check==="D-FANOUT"));
  if(secured)h+=`<div class="section-label">Security</div><p class="sub">Target <b style="color:var(--rls)">${esc(j.to)}</b> has RLS — this join propagates the row filter to <b>${esc(j.from)}</b>.</p>`;
  inspector.innerHTML=h;$("back").onclick=()=>{focusSet=[];selected=null;renderAll();showOverview();};inspector.scrollTop=0;
}

function showRlsSubgraph(){
  let h=`<button class="backlink" id="back">← Overview</button><h2>Secured subgraph</h2>
    <p class="sub">Only tables touched by row-level security stay vivid: the secured tables plus every fact that inherits their row filter through joins. Everything else is ghosted.</p>
    <div class="section-label">Secured tables (${securedTables.length})</div>`;
  MODEL.tables.filter(t=>t.rls).forEach(t=>{const aff=[...ancestors(t.id)];
    h+=`<div style="font-size:11.5px;font-weight:600;margin-bottom:6px;font-family:var(--mono);cursor:pointer" data-go="${esc(t.id)}">🔒 ${esc(t.id)}</div>`+t.rls.map(r=>ruleCard(r,aff)).join("");});
  const inh=[...rlsAffected];
  h+=`<div class="section-label">Inherits RLS (${inh.length})</div>
    <p class="sub">${inh.length?inh.map(x=>`<span class="chip">${esc(x)}</span>`).join(""):"None."}</p>
    <p class="note">Turn this off to return to the full model. Use it to answer “if I secure this dimension, what else gets filtered?” at a glance.</p>`;
  inspector.innerHTML=h;$("back").onclick=()=>{tRlsOnly.checked=false;rlsOnly=false;renderAll();showOverview();};
  inspector.querySelectorAll("[data-go]").forEach(e=>e.onclick=()=>selectTable(e.dataset.go,false));inspector.scrollTop=0;
}

// ---- controls wiring ----
document.querySelectorAll("#layout-seg button").forEach(b=>b.onclick=()=>setLayout(b.dataset.l));
document.querySelectorAll("#notation-seg button").forEach(b=>b.onclick=()=>{notation=b.dataset.n;
  document.querySelectorAll("#notation-seg button").forEach(x=>x.classList.toggle("on",x.dataset.n===notation));renderEdges();});
colSel.onchange=()=>{colMode=colSel.value;renderAll();fit();}; // columns change heights only — positions kept
$("reset-pos").onclick=()=>{delete savedPos[layoutName];persistSaved();
  layoutCache[layoutName]=layoutName==="organic"?computeOrganic():layoutName==="star"?computeStar():computeLayered(layoutName);
  setLayout(layoutName);};
tFind.onchange=renderAll; tRls.onchange=renderAll; tOrth.onchange=renderEdges;
tRlsOnly.onchange=()=>{rlsOnly=tRlsOnly.checked;if(rlsOnly){focusSet=[];selected=null;}renderAll();if(rlsOnly)showRlsSubgraph();else showOverview();};
const dl=$("tablelist");MODEL.tables.forEach(t=>{const o=document.createElement("option");o.value=t.id;dl.appendChild(o);});
$("finder").addEventListener("change",e=>{const id=e.target.value.trim();if(tableById[id]){selectTable(id,false);centerOn(nodeById[id]);e.target.value="";}});

// ---- stats + init ----
$("s-tables").textContent=MODEL.tables.length;$("s-joins").textContent=MODEL.joins.length;
$("s-crit").textContent=MODEL.findings.filter(f=>f.sev==="crit").length;
$("s-warn").textContent=MODEL.findings.filter(f=>f.sev==="warn").length;
$("s-rls").textContent=securedTables.length;
const init0=hasAll(savedPos.organic)?savedPos.organic:layoutCache.organic;
nodes.forEach(n=>{n.x=init0[n.t.id].x;n.y=init0[n.t.id].y;});
updateSavedBadge();renderAll();fit();showOverview();
</script>
