<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ThoughtSpot Audit Report</title>
<style>
:root {
  --ground:#F6F7F9; --surface:#FFFFFF; --surface-2:#FBFCFD;
  --ink:#161B26; --muted:#6B7480; --hair:#E2E6EC; --hair-2:#EDF0F4;
  --accent:#1E6FA8; --accent-soft:#EAF2F8;
  --warn:#B5730A; --warn-soft:#FBF1DF;
  --crit:#C2382E; --crit-soft:#FBE9E7;
  --ok:#2E8B62; --ok-soft:#E6F3EC;
  --sev-critical:#C2382E; --sev-high:#f97316; --sev-medium:#eab308;
  --sev-low:#3b82f6; --sev-info:#6B7480; --sev-green:#2E8B62;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --sidebar-w:210px;
  --topbar-h:44px;
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--ground);
  font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums;}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}
a:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px;}

/* ── Layout shell ── */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--hair);display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  overflow-y:auto;overflow-x:hidden;
}
.sidebar-header{
  padding:14px 16px 10px;border-bottom:1px solid var(--hair);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.sidebar-header .logo{
  font-weight:700;font-size:14px;letter-spacing:-.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sidebar-header .logo-sub{
  font-size:10px;text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);font-weight:600;
}

.sidebar-nav{padding:6px 0;flex-shrink:0;}
.sidebar-nav a{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;font-size:13px;font-weight:500;
  color:var(--ink);text-decoration:none;
  border-left:3px solid transparent;transition:background .1s;
}
.sidebar-nav a:hover{background:var(--ground);}
.sidebar-nav a.active{
  background:var(--accent-soft);color:var(--accent);
  border-left-color:var(--accent);font-weight:600;
}
.sidebar-nav a .nav-icon{width:16px;text-align:center;font-size:14px;flex-shrink:0;}
.sidebar-nav a .badge{
  margin-left:auto;background:var(--crit);color:#fff;
  font-size:10px;font-weight:700;padding:1px 6px;
  border-radius:10px;min-width:18px;text-align:center;
}
.sidebar-divider{height:1px;background:var(--hair);margin:6px 16px;}

.sidebar-section-label{
  padding:8px 16px 4px;font-size:10px;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);font-weight:600;
  display:flex;align-items:center;gap:4px;cursor:pointer;
  user-select:none;
}
.sidebar-section-label .chevron{
  font-size:9px;transition:transform .15s;
}
.sidebar-section-label.collapsed .chevron{transform:rotate(-90deg);}

.sidebar-model-list{padding:0 0 8px;}
.sidebar-model-list a{
  display:block;padding:3px 16px 3px 28px;font-size:12px;
  color:var(--muted);text-decoration:none;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .1s;
}
.sidebar-model-list a:hover{color:var(--ink);background:var(--ground);}
.sidebar-model-list a.active{color:var(--accent);font-weight:600;}

/* Hamburger toggle (mobile) */
.hamburger{
  display:none;position:fixed;top:8px;left:8px;z-index:200;
  width:36px;height:36px;background:var(--surface);border:1px solid var(--hair);
  border-radius:6px;font-size:18px;align-items:center;justify-content:center;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}

/* Main area */
.main{
  margin-left:var(--sidebar-w);flex:1;min-width:0;
  display:flex;flex-direction:column;
}

/* Topbar */
.topbar{
  position:sticky;top:0;z-index:50;background:var(--surface);
  border-bottom:1px solid var(--hair);
  padding:0 24px;height:var(--topbar-h);
  display:flex;align-items:center;gap:12px;
}
.breadcrumb{
  font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;
  white-space:nowrap;
}
.breadcrumb .sep{color:var(--hair);}
.breadcrumb .current{color:var(--ink);font-weight:600;}

.filter-pills{
  margin-left:auto;display:flex;gap:4px;flex-shrink:0;
}
.filter-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;
  border:1px solid var(--hair);background:var(--surface);
  transition:all .12s;cursor:pointer;user-select:none;
  letter-spacing:.01em;
}
.filter-pill .dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
}
.filter-pill .pill-label{
  line-height:1;
}
.filter-pill.active{border-color:currentColor;background:currentColor;}
.filter-pill.active .pill-label{color:#fff;}
.filter-pill.active .dot{background:#fff;}

.filter-pill[data-sev="CRITICAL"]{color:var(--sev-critical);}
.filter-pill[data-sev="CRITICAL"] .dot{background:var(--sev-critical);}
.filter-pill[data-sev="HIGH"]{color:var(--sev-high);}
.filter-pill[data-sev="HIGH"] .dot{background:var(--sev-high);}
.filter-pill[data-sev="MEDIUM"]{color:var(--sev-medium);}
.filter-pill[data-sev="MEDIUM"] .dot{background:var(--sev-medium);}
.filter-pill[data-sev="LOW"]{color:var(--sev-low);}
.filter-pill[data-sev="LOW"] .dot{background:var(--sev-low);}
.filter-pill[data-sev="INFO"]{color:var(--sev-info);}
.filter-pill[data-sev="INFO"] .dot{background:var(--sev-info);}

/* View containers */
.view{display:none;padding:24px;flex:1;}
.view.active{display:block;}

/* ── Dashboard ── */
.dash-header{
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  padding:16px 20px;margin-bottom:16px;
  display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 24px;
}
.dash-header .cluster-url{
  font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:4px;
}
.dash-header .cluster-url .ext{font-size:11px;color:var(--muted);}
.dash-header .meta-item{
  font-size:12px;color:var(--muted);
}
.dash-header .meta-item strong{color:var(--ink);font-weight:600;}
.dash-header .angles{
  display:flex;gap:4px;margin-left:0;
}
.dash-header .angle-tag{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
  padding:2px 7px;border-radius:3px;background:var(--ground);color:var(--muted);
}

/* Severity cards */
.sev-cards{
  display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;
}
.sev-card{
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  padding:12px 16px;cursor:pointer;transition:box-shadow .12s,border-color .12s;
  position:relative;overflow:hidden;
}
.sev-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:var(--muted);}
.sev-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
}
.sev-card[data-sev="CRITICAL"]::before{background:var(--sev-critical);}
.sev-card[data-sev="HIGH"]::before{background:var(--sev-high);}
.sev-card[data-sev="MEDIUM"]::before{background:var(--sev-medium);}
.sev-card[data-sev="LOW"]::before{background:var(--sev-low);}
.sev-card[data-sev="INFO"]::before{background:var(--sev-info);}
.sev-card .sev-count{
  font-size:28px;font-weight:700;line-height:1;
}
.sev-card[data-sev="CRITICAL"] .sev-count{color:var(--sev-critical);}
.sev-card[data-sev="HIGH"] .sev-count{color:var(--sev-high);}
.sev-card[data-sev="MEDIUM"] .sev-count{color:var(--sev-medium);}
.sev-card[data-sev="LOW"] .sev-count{color:var(--sev-low);}
.sev-card[data-sev="INFO"] .sev-count{color:var(--sev-info);}
.sev-card .sev-label{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);margin-top:4px;
}

/* Heatmap */
.heatmap-wrap{
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  padding:16px 20px;margin-bottom:16px;overflow-x:auto;
}
.heatmap-title{
  font-size:13px;font-weight:600;margin-bottom:12px;
}
.heatmap{
  border-collapse:collapse;width:100%;min-width:500px;
}
.heatmap th{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
  color:var(--muted);padding:6px 8px;text-align:center;
  border-bottom:1px solid var(--hair);
}
.heatmap th.model-col{
  text-align:left;min-width:140px;max-width:200px;
}
.heatmap th.angle-col{min-width:90px;cursor:pointer;}
.heatmap th.angle-col:hover{color:var(--accent);}
.heatmap td{padding:4px;text-align:center;border-bottom:1px solid var(--hair-2);}
.heatmap td.model-name{
  text-align:left;padding:6px 8px;font-size:12px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:200px;
}
.heatmap td.model-name a{color:var(--ink);text-decoration:none;}
.heatmap td.model-name a:hover{color:var(--accent);text-decoration:underline;}
.heatmap .cell{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:22px;border-radius:3px;
  cursor:pointer;transition:opacity .1s;
  font-size:10px;font-weight:700;color:#fff;line-height:1;
}
.heatmap .cell:hover{opacity:.75;}
.heatmap .cell[data-severity="CRITICAL"]{background:var(--sev-critical);}
.heatmap .cell[data-severity="HIGH"]{background:var(--sev-high);}
.heatmap .cell[data-severity="MEDIUM"]{background:var(--sev-medium);}
.heatmap .cell[data-severity="LOW"]{background:var(--sev-low);}
.heatmap .cell[data-severity="INFO"]{background:var(--sev-info);}
.heatmap .cell[data-severity="PASS"]{background:var(--sev-green);}
.heatmap .cell[data-severity="NONE"]{background:var(--hair-2);}

/* Stats strip */
.stats-strip{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
}
.stat-box{
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  padding:12px 16px;text-align:center;
}
.stat-box .stat-value{
  font-size:22px;font-weight:700;line-height:1;color:var(--accent);
}
.stat-box .stat-label{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);margin-top:4px;
}
.stat-box:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:var(--muted);}

/* Placeholder views */
.view-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;color:var(--muted);
}
.view-placeholder .ph-icon{font-size:32px;margin-bottom:12px;opacity:.4;}
.view-placeholder .ph-text{font-size:14px;font-weight:500;}
.view-placeholder .ph-sub{font-size:12px;margin-top:4px;}

/* ── Scorecard ── */
.scorecard-header{
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  padding:16px 20px;margin-bottom:16px;
}
.scorecard-header .model-title{
  font-size:18px;font-weight:700;line-height:1.2;margin-bottom:4px;
}
.scorecard-header .model-guid{
  font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px;
}
.scorecard-header .model-stats{
  display:flex;flex-wrap:wrap;gap:16px;
}
.scorecard-header .stat-item{
  display:flex;flex-direction:column;align-items:center;
  min-width:60px;
}
.scorecard-header .stat-item .stat-val{
  font-size:20px;font-weight:700;line-height:1;color:var(--accent);
}
.scorecard-header .stat-item .stat-lbl{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);margin-top:2px;
}
.scorecard-header .header-actions{
  display:flex;gap:8px;margin-top:12px;
}
.model-desc{
  font-size:12px;color:var(--muted);line-height:1.5;margin:8px 0 0;
  font-style:italic;
}
.ai-panel{
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  margin-bottom:10px;overflow:hidden;
}
.ai-panel > summary{
  display:flex;align-items:center;gap:8px;padding:12px 16px;
  cursor:pointer;user-select:none;font-weight:600;font-size:13px;
  list-style:none;
}
.ai-panel > summary::-webkit-details-marker{display:none;}
.ai-panel > summary::before{
  content:"▸";font-size:10px;color:var(--muted);transition:transform .15s;flex-shrink:0;
}
.ai-panel[open] > summary::before{transform:rotate(90deg);}
.ai-panel > summary:hover{background:var(--ground);}
.ai-panel-body{padding:0 16px 12px;}
.ai-sub{margin-bottom:10px;}
.ai-sub h4{font-size:12px;font-weight:600;color:var(--ink);margin:0 0 4px;text-transform:uppercase;letter-spacing:.04em;}
.ai-sub ul{margin:0;padding:0 0 0 16px;font-size:12px;color:var(--muted);line-height:1.5;}
.ai-sub p{margin:0;font-size:12px;color:var(--muted);line-height:1.5;}
.erd-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;
  background:var(--accent);color:#fff;border:1px solid var(--accent);
  cursor:pointer;transition:opacity .12s;
}
.erd-btn:hover{opacity:.85;}
.ts-link-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;
  background:var(--surface);color:var(--accent);border:1px solid var(--hair);
  text-decoration:none;cursor:pointer;transition:background .12s;
}
.ts-link-btn:hover{background:var(--accent-soft);text-decoration:none;}

.angle-section{
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  margin-bottom:10px;overflow:hidden;
}
.angle-section > summary{
  display:flex;align-items:center;gap:8px;padding:12px 16px;
  cursor:pointer;user-select:none;font-weight:600;font-size:13px;
  list-style:none;
}
.angle-section > summary::-webkit-details-marker{display:none;}
.angle-section > summary::before{
  content:"▸";font-size:10px;color:var(--muted);transition:transform .15s;flex-shrink:0;
}
.angle-section[open] > summary::before{transform:rotate(90deg);}
.angle-section > summary:hover{background:var(--ground);}
.angle-section .angle-name{flex:1;}
.angle-section .angle-count{
  font-size:11px;color:var(--muted);font-weight:500;
}
.angle-section.sev-CRITICAL{border-left:3px solid var(--sev-critical);}
.angle-section.sev-HIGH{border-left:3px solid var(--sev-high);}
.angle-section.sev-MEDIUM{border-left:3px solid var(--sev-medium);}
.angle-section.sev-LOW{border-left:3px solid var(--sev-low);}
.angle-section.sev-INFO{border-left:3px solid var(--sev-info);}
.angle-section.sev-NONE{border-left:3px solid var(--hair);}
.angle-section.sev-PASS{border-left:3px solid var(--sev-green);}

.findings-body{padding:0 16px 12px;}
.finding-card{
  border:1px solid var(--hair-2);border-radius:6px;padding:10px 12px;
  margin-top:8px;background:var(--surface-2);
  transition:border-color .1s;
}
.finding-card:hover{border-color:var(--hair);}
.finding-card.hidden-by-filter{display:none;}
.finding-card .card-top{
  display:flex;align-items:center;gap:8px;margin-bottom:6px;
}
.finding-card .check-badge{
  font-family:var(--mono);font-size:10px;font-weight:700;
  background:var(--ground);color:var(--muted);
  padding:2px 7px;border-radius:3px;border:1px solid var(--hair);
  flex-shrink:0;
}
.sev-pill{
  display:inline-flex;align-items:center;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;
  flex-shrink:0;
}
.sev-pill.sev-critical{background:var(--crit-soft);color:var(--sev-critical);}
.sev-pill.sev-high{background:#fff4ec;color:var(--sev-high);}
.sev-pill.sev-medium{background:#fefce8;color:#92400e;}
.sev-pill.sev-low{background:#eff6ff;color:var(--sev-low);}
.sev-pill.sev-info{background:var(--ground);color:var(--sev-info);}

.finding-card .detail-text{
  font-size:12px;color:var(--ink);margin-bottom:6px;line-height:1.4;
}

.metric-bar-wrap{margin-bottom:6px;}
.metric-bar-label{
  font-size:11px;color:var(--muted);margin-bottom:3px;
  display:flex;justify-content:space-between;
}
.metric-bar{
  height:6px;border-radius:3px;background:var(--hair-2);overflow:hidden;
}
.metric-bar-fill{
  height:100%;border-radius:3px;background:var(--sev-critical);
  transition:width .3s;
}
.metric-bar-fill.ok{background:var(--sev-green);}

.finding-recommendation{
  font-size:11px;color:var(--accent);background:var(--accent-soft);
  border-radius:4px;padding:4px 8px;margin-top:4px;
}

.dependents-panel{
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  margin-top:10px;overflow:hidden;
}
.dependents-panel > summary{
  display:flex;align-items:center;gap:8px;padding:12px 16px;
  cursor:pointer;user-select:none;font-weight:600;font-size:13px;
  list-style:none;
}
.dependents-panel > summary::-webkit-details-marker{display:none;}
.dependents-panel > summary::before{
  content:"▸";font-size:10px;color:var(--muted);transition:transform .15s;flex-shrink:0;
}
.dependents-panel[open] > summary::before{transform:rotate(90deg);}
.dependents-panel > summary:hover{background:var(--ground);}
.dependents-body{padding:0 16px 12px;}
.dependent-item{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  border-bottom:1px solid var(--hair-2);
}
.dependent-item:last-child{border-bottom:none;}
.dep-type-badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;
  flex-shrink:0;
}
.dep-type-badge.ANSWER{background:var(--accent-soft);color:var(--accent);}
.dep-type-badge.LIVEBOARD{background:var(--ok-soft);color:var(--ok);}
.dep-name{font-size:12px;font-weight:500;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dep-guid{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;}
.dep-link{font-size:11px;color:var(--accent);flex-shrink:0;}

.erd-container{
  background:var(--accent-soft);border:2px dashed var(--accent);
  border-radius:8px;padding:24px;margin-top:12px;text-align:center;
  color:var(--accent);
}
.erd-container .erd-msg{
  font-size:13px;font-weight:500;margin-top:8px;
}
.erd-container .erd-sub{
  font-size:11px;color:var(--muted);margin-top:4px;
}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .2s;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.12);}
  .hamburger{display:flex;}
  .main{margin-left:0;}
  .topbar{padding-left:52px;}
  .sev-cards{grid-template-columns:repeat(3,1fr);}
  .stats-strip{grid-template-columns:repeat(2,1fr);}
  .dash-header{padding:12px 16px;}
  .view{padding:16px;}
}
@media(max-width:480px){
  .sev-cards{grid-template-columns:repeat(2,1fr);}
  .filter-pills{display:none;}
}

/* ── Cross-Model view ── */
.crossmodel-filter{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  padding:10px 14px;margin-bottom:12px;
}
.crossmodel-filter input[type="search"]{
  flex:1;min-width:160px;padding:5px 10px;border:1px solid var(--hair);
  border-radius:6px;font:inherit;font-size:12px;color:var(--ink);
  background:var(--ground);outline:none;
}
.crossmodel-filter input[type="search"]:focus{
  border-color:var(--accent);background:var(--surface);
}
.crossmodel-filter label{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;
}
.crossmodel-filter .cm-count{
  margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap;
}

.crossmodel-wrap{
  background:var(--surface);border:1px solid var(--hair);border-radius:8px;
  overflow-x:auto;overflow-y:auto;max-height:calc(100vh - var(--topbar-h) - 120px);
}
.crossmodel-table{

.crossmodel-table th{

  color:var(--muted);padding:8px 10px;text-align:left;

  padding:7px 10px;border-bottom:1px solid var(--hair-2);

.crossmodel-table .col-sev{width:90px;}
.crossmodel-table .col-check{width:70px;font-family:var(--mono);font-size:10px;}

.crossmodel-table .model-link{color:var(--ink);font-weight:500;}

.crossmodel-table .ts-icon{

.group-header td{

}
.group-header .gh-count{

}
.group-header .gh-thresh{
  font-size:10px;color:var(--muted);font-weight:400;

/* ── Object Map ── */
.object-map-tabs{

.object-map-tabs button{

.om-subtab{display:none;}

.om-section{

.om-section h3{font-size:14px;font-weight:700;margin:0 0 12px;}

.overlap-table{border-collapse:collapse;width:100%;min-width:500px;}

.reuse-table,.dep-detail-table{border-collapse:collapse;width:100%;min-width:400px;}

}

}
@keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.empty-state{

}

/* ── Print ── */
@media print{
  .sidebar,.hamburger,.topbar{display:none!important;}
  .main{margin-left:0!important;}
  .view{padding:12px 0!important;}
  .sev-card::before{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .heatmap .cell{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sev-card .sev-label::after{
    content:" (" attr(data-count) ")";
  }
  details{display:block;}
  details[open] summary ~ *{display:block;}
  details:not([open]) > *:not(summary){display:block!important;}
  .sev-pill{border:1px solid #000;color:#000!important;background:#fff!important;}
  .filter-pills{display:none!important;}
  .object-map-tabs{display:none!important;}
  .om-subtab{display:block!important;}
}

<body>

<button class="hamburger" aria-label="Toggle sidebar">&#9776;</button>

<div id="app">
  <nav class="sidebar" role="navigation" aria-label="Main navigation">
    <div class="sidebar-header">
      <div>
        <div class="logo">ThoughtSpot Audit</div>
        <div class="logo-sub">Health Report</div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>

  <main class="main">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="filter-pills" id="filter-pills"></div>
    </div>

    <div class="view" id="v-dashboard"></div>
    <div class="view" id="v-scorecard"></div>
    <div class="view" id="v-crossmodel"></div>
    <div class="view" id="v-objectmap"></div>
    <div class="view" id="v-cleanup"></div>
  </main>
</div>

<script id="audit-data" type="application/json">{{AUDIT_DATA}}</script>
<script>
(function(){
"use strict";

/* ── Parse data ── */
var raw = document.getElementById("audit-data").textContent;
var D = JSON.parse(raw);

/* ── Constants ── */
var SEVS = ["CRITICAL","HIGH","MEDIUM","LOW","INFO"];
var SEV_ORDER = {};
SEVS.forEach(function(s,i){ SEV_ORDER[s] = i; });

var ANGLE_LABELS = {
  ai:"AI Readiness", data_modeling:"Data Modeling", human:"Human Readiness",
  performance:"Performance", security:"Security"
};
var ANGLE_SHORT = {A:"ai",D:"data_modeling",H:"human",P:"performance",S:"security"};
var ANGLE_CODES = {ai:"A",data_modeling:"D",human:"H",performance:"P",security:"S"};

/* ── State ── */
var activeSevs = {};
SEVS.forEach(function(s){ activeSevs[s] = true; });
var builtViews = {};
var currentRoute = null;
var _sevFilterListener = null;
var _crossmodelSevListener = null;

/* ── Helpers ── */
function $(sel,ctx){ return (ctx||document).querySelector(sel); }
function $$(sel,ctx){ return Array.prototype.slice.call((ctx||document).querySelectorAll(sel)); }
function el(tag,cls,html){
  var e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}

function esc(s){
  if(!s) return "";
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function worstSev(findings){
  var worst = 999;
  for(var i=0;i<findings.length;i++){
    var idx = SEV_ORDER[findings[i].s];
    if(idx !== undefined && idx < worst) worst = idx;
  }
  return worst < 999 ? SEVS[worst] : "NONE";
}

function countCritHigh(){
  var c = 0;
  if(D.S && D.S.bs){
    c += (D.S.bs.CRITICAL||0) + (D.S.bs.HIGH||0);
  }
  return c;
}

/* ── Build sidebar ── */
function buildSidebar(){
  var nav = document.getElementById("sidebar-nav");
  var badge = countCritHigh();

  var links = [
    {hash:"#dashboard", icon:"▣", label:"Dashboard", badge: badge > 0 ? badge : null},
    {hash:"#crossmodel", icon:"≡", label:"Cross-Model"},
    {hash:"#objectmap", icon:"⬡", label:"Object Map"},
    {hash:"#cleanup", icon:"✂", label:"Cleanup"}
  ];

  var html = "";
  links.forEach(function(lk){
    html += '<a href="'+lk.hash+'" data-route="'+lk.hash+'">';
    html += '<span class="nav-icon">'+lk.icon+'</span>';
    html += '<span>'+lk.label+'</span>';
    if(lk.badge) html += '<span class="badge">'+lk.badge+'</span>';
    html += '</a>';
  });

  html += '<div class="sidebar-divider"></div>';
  html += '<div class="sidebar-section-label" id="models-toggle"><span class="chevron">▾</span> Models</div>';
  html += '<div class="sidebar-model-list" id="sidebar-models"></div>';
  nav.innerHTML = html;

  /* Model list */
  var models = getModelList();
  var mlist = document.getElementById("sidebar-models");
  var mhtml = "";
  models.forEach(function(m){
    mhtml += '<a href="#model/'+m.g+'" data-route="#model/'+m.g+'" title="'+esc(m.n)+'">'+esc(m.n)+'</a>';
  });
  mlist.innerHTML = mhtml;

  /* Toggle models section */
  var toggle = document.getElementById("models-toggle");
  toggle.addEventListener("click",function(){
    toggle.classList.toggle("collapsed");
    mlist.style.display = toggle.classList.contains("collapsed") ? "none" : "";
  });
}

function getModelList(){
  /* Prefer corpus models (ordered), fall back to lookup */
  if(D.C && D.C.m && D.C.m.length > 0){
    return D.C.m.map(function(cm){ return D.L[cm.mi]; });
  }
  return D.L || [];
}

/* ── Build filter pills ── */
function buildFilterPills(){
  var container = document.getElementById("filter-pills");
  var html = "";
  SEVS.forEach(function(s){
    html += '<button class="filter-pill active" data-sev="'+s+'" title="Toggle '+s+' findings">';
    html += '<span class="dot"></span>';
    html += '<span class="pill-label">'+s.charAt(0)+s.slice(1).toLowerCase()+'</span>';
    html += '</button>';
  });
  container.innerHTML = html;

  $$(".filter-pill",container).forEach(function(pill){
    pill.addEventListener("click",function(){
      var sev = pill.getAttribute("data-sev");
      toggleSeverity(sev);
      pill.classList.toggle("active");
    });
  });
}

function toggleSeverity(sev){
  activeSevs[sev] = !activeSevs[sev];
  /* Dispatch a custom event so views can react */
  document.dispatchEvent(new CustomEvent("sev-filter-changed",{detail:{severity:sev,active:activeSevs[sev]}}));
}

/* ── Breadcrumb ── */
function updateBreadcrumb(parts, links){
  var bc = document.getElementById("breadcrumb");
  var html = '<a href="#dashboard" style="color:var(--muted);text-decoration:none;">Audit</a>';
  parts.forEach(function(p,i){
    html += ' <span class="sep">/</span> ';
    if(i === parts.length - 1){
      html += '<span class="current">'+esc(p)+'</span>';
    } else {
      var href = (links && links[i]) ? links[i] : "#dashboard";
      html += '<a href="'+href+'" style="color:var(--muted);text-decoration:none;">'+esc(p)+'</a>';
    }
  });
  bc.innerHTML = html;
}

/* ── Router ── */
function parseRoute(){
  var hash = location.hash || "#dashboard";
  if(hash === "#") hash = "#dashboard";
  var parts = hash.substring(1).split("/");
  var view = parts[0];
  var query = "";
  /* Strip query string from view */
  var qIdx = view.indexOf("?");
  if(qIdx !== -1){
    query = view.substring(qIdx + 1);
    view = view.substring(0, qIdx);
  }
  return {view: view, id: parts[1] || null, sub: parts[2] || null, query: query, raw: hash};
}

function navigate(hash){
  if(hash && hash !== location.hash){
    location.hash = hash;
  }
}

function onRoute(){
  var route = parseRoute();
  currentRoute = route;

  /* Hide all views */
  $$(".view").forEach(function(v){ v.classList.remove("active"); });

  /* Update sidebar active state */
  $$(".sidebar-nav a").forEach(function(a){ a.classList.remove("active"); });
  $$(".sidebar-model-list a").forEach(function(a){ a.classList.remove("active"); });

  var viewId, breadcrumbParts, breadcrumbLinks;

  switch(route.view){
    case "model":
      viewId = "v-scorecard";
      var modelName = route.id ? findModelName(route.id) : "Model";
      breadcrumbParts = ["Dashboard",modelName];
      breadcrumbLinks = ["#dashboard"];
      if(route.sub) breadcrumbParts.push(ANGLE_FULL_NAMES[route.sub]||ANGLE_LABELS[ANGLE_SHORT[route.sub]]||route.sub);
      /* Highlight sidebar model */
      var mLink = $('[data-route="#model/'+route.id+'"]');
      if(mLink) mLink.classList.add("active");
      /* Always rebuild scorecard — different model = different content */
      buildScorecard(D, route.id, route.sub||null);
      break;
    case "crossmodel":
      viewId = "v-crossmodel";
      highlightNav("#crossmodel");
      /* Parse query params from hash (e.g. ?severity=HIGH or ?angle=D) */
      var cmFilters = {};
      if(route.query){
        route.query.split("&").forEach(function(part){
          var kv = part.split("=");
          if(kv.length === 2) cmFilters[kv[0]] = decodeURIComponent(kv[1]);
        });
      }
      /* Build descriptive breadcrumb */
      var cmCrumb = "Cross-Model";
      if(cmFilters.severity) cmCrumb = "Cross-Model — "+cmFilters.severity;
      else if(cmFilters.angle){
        var angleLabel = ANGLE_LABELS[ANGLE_SHORT[cmFilters.angle]||cmFilters.angle] || cmFilters.angle;
        cmCrumb = "Cross-Model — "+angleLabel;
      }
      breadcrumbParts = ["Dashboard", cmCrumb];
      breadcrumbLinks = ["#dashboard"];
      /* Always rebuild — filters change on each navigation */
      buildCrossModel(D, cmFilters);
      break;
    case "object-map":
    case "objectmap":
      viewId = "v-objectmap";
      var omSub = route.id || "overlaps";
      breadcrumbParts = ["Object Map", omSub.charAt(0).toUpperCase()+omSub.slice(1)];
      breadcrumbLinks = ["#objectmap"];
      highlightNav("#objectmap");
      buildObjectMap(D, omSub);
      break;
    case "cleanup":
      viewId = "v-cleanup";
      breadcrumbParts = ["Cleanup"];
      breadcrumbLinks = [];
      highlightNav("#cleanup");
      buildCleanup(D);
      break;
    default: /* dashboard */
      viewId = "v-dashboard";
      breadcrumbParts = ["Dashboard"];
      breadcrumbLinks = [];
      highlightNav("#dashboard");
      if(!builtViews.dashboard){ buildDashboard(); builtViews.dashboard=true; }
      break;
  }

  var viewEl = document.getElementById(viewId);
  if(viewEl) viewEl.classList.add("active");
  updateBreadcrumb(breadcrumbParts, breadcrumbLinks);

  /* Severity filter pills only apply to Cross-Model and Scorecard */
  var pills = document.getElementById("filter-pills");
  if(pills) pills.style.display = (route.view === "crossmodel" || route.view === "model") ? "" : "none";
}

function highlightNav(hash){
  var link = $('[data-route="'+hash+'"]',document.getElementById("sidebar-nav"));
  if(link) link.classList.add("active");
}

function findModelName(guid){
  for(var i=0;i<D.L.length;i++){
    if(D.L[i].g === guid) return D.L[i].n;
  }
  return guid;
}

/* ── Scorecard helpers ── */
var ANGLE_FULL_NAMES = {
  A:"AI Readiness",D:"Data Modeling",H:"Human Readiness",P:"Performance",S:"Security"
};

var RECOMMENDATIONS = {
  A1:"Run /ts-object-model-coach to improve descriptions, synonyms, AI context",
  A2:"Run /ts-object-model-coach to improve descriptions, synonyms, AI context",
  A3:"Run /ts-object-model-coach to improve descriptions, synonyms, AI context",
  A4:"Run /ts-object-model-coach to improve descriptions, synonyms, AI context",
  A5:"Run /ts-object-model-coach to improve descriptions, synonyms, AI context",
  D7:"Run /ts-dependency-manager (Repoint mode) to consolidate overlapping models",
  D8:"Run /ts-dependency-manager (Remove mode) to remove duplicate table objects",
  H3:"Remove unnecessary hidden columns via TML reimport",
  H4:"Run /ts-dependency-manager (Remove mode) if confirmed unused",
  H8:"Run /ts-object-answer-promote to promote formula to model",
  S1:"Review security settings via ThoughtSpot UI or TML reimport",
  S2:"Review security settings via ThoughtSpot UI or TML reimport",
  S3:"Review security settings via ThoughtSpot UI or TML reimport",
  S4:"Review security settings via ThoughtSpot UI or TML reimport",
  S5:"Review security settings via ThoughtSpot UI or TML reimport"
};

function severityPill(sev){
  var lower = (sev||"").toLowerCase();
  return '<span class="sev-pill sev-'+lower+'">'+(sev||"")+'</span>';
}

function tsLink(clusterUrl, guid, type){
  if(!clusterUrl || !guid) return "";
  var path = type === "ANSWER" ? "saved-answer" : (type === "LIVEBOARD" ? "pinboard" : "data/tables");
  return '<a class="dep-link ts-link-btn" href="'+clusterUrl+'/#/'+path+'/'+guid+'" target="_blank" rel="noopener">Open ↗</a>';
}

function findCorpusModel(guid){
  if(!D.C || !D.C.m) return null;
  for(var i=0;i<D.C.m.length;i++){
    var cm = D.C.m[i];
    if(D.L[cm.mi] && D.L[cm.mi].g === guid) return cm;
  }
  return null;
}

/* ── Build scorecard ── */
function buildScorecard(D, guid, filterAngle){
  var c = document.getElementById("v-scorecard");
  c.innerHTML = "";

  /* Remove old listener before rebuilding */
  if(_sevFilterListener) document.removeEventListener("sev-filter-changed", _sevFilterListener);

  /* Model metadata */
  var modelName = findModelName(guid);
  var cm = findCorpusModel(guid);

  /* ── Header ── */
  var hdr = el("div","scorecard-header");
  var titleHtml = '<div class="model-title">'+esc(modelName)+'</div>';
  titleHtml += '<div class="model-guid">'+esc(guid)+'</div>';

  /* Stats from corpus */
  if(cm){
    titleHtml += '<div class="model-stats">';
    var statItems = [
      {v:cm.tc,l:"Tables"},
      {v:cm.cc,l:"Columns"},
      {v:cm.fc,l:"Formulas"},
      {v:cm.jc,l:"Joins"},
      {v:cm.jd,l:"Join Depth"}
    ];
    statItems.forEach(function(s){
      titleHtml += '<div class="stat-item"><div class="stat-val">'+s.v+'</div><div class="stat-lbl">'+s.l+'</div></div>';
    });
    titleHtml += '</div>';
  }

  /* Model description */
  if(cm && cm.ds){
    titleHtml += '<div class="model-desc">'+esc(cm.ds)+'</div>';
  }

  /* Actions */
  titleHtml += '<div class="header-actions">';
  if(D.C && D.C.u){
    titleHtml += '<a class="ts-link-btn" href="'+D.C.u+'/#/data/tables/'+guid+'" target="_blank" rel="noopener">Open in ThoughtSpot ↗</a>';
  }
  titleHtml += '<button class="erd-btn" id="erd-toggle-'+guid+'" data-erd-ready="false">ERD Diagram</button>';
  titleHtml += '</div>';

  hdr.innerHTML = titleHtml;
  c.appendChild(hdr);

  /* ── AI Analysis panel ── */
  if(cm && cm.ai){
    var aiPanel = document.createElement("details");
    aiPanel.className = "ai-panel";
    aiPanel.open = true;

    var aiSummary = document.createElement("summary");
    aiSummary.textContent = "Model Analysis";
    aiPanel.appendChild(aiSummary);

    var aiBody = el("div","ai-panel-body");

    if(cm.ai.pe && cm.ai.pe.length > 0){
      var perSec = el("div","ai-sub");
      perSec.innerHTML = '<h4>Target Personas</h4>';
      var perUl = document.createElement("ul");
      cm.ai.pe.forEach(function(p){
        var li = document.createElement("li");
        li.textContent = p;
        perUl.appendChild(li);
      });
      perSec.appendChild(perUl);
      aiBody.appendChild(perSec);
    }

    if(cm.ai.qu && cm.ai.qu.length > 0){
      var qSec = el("div","ai-sub");
      qSec.innerHTML = '<h4>Business Questions</h4>';
      var qUl = document.createElement("ul");
      cm.ai.qu.forEach(function(q){
        var li = document.createElement("li");
        li.textContent = q;
        qUl.appendChild(li);
      });
      qSec.appendChild(qUl);
      aiBody.appendChild(qSec);
    }

    if(cm.ai.st){
      var stSec = el("div","ai-sub");
      stSec.innerHTML = '<h4>Model Structure</h4>';
      var stP = document.createElement("p");
      stP.textContent = cm.ai.st;
      stSec.appendChild(stP);
      aiBody.appendChild(stSec);
    }

    aiPanel.appendChild(aiBody);
    c.appendChild(aiPanel);
  }

  /* ── Angle sections ── */
  var angles = (D.C && D.C.ar && D.C.ar.length > 0) ? D.C.ar : ["A","D","H","P","S"];

  /* Find model index for this guid */
  var modelIdx = -1;
  for(var li=0;li<D.L.length;li++){
    if(D.L[li].g === guid){ modelIdx = li; break; }
  }

  /* Group findings by angle code */
  var findingsByAngle = {};
  if(D.F){
    D.F.forEach(function(f){
      /* Map full angle name to code */
      var code = ANGLE_CODES[f.a] || f.a;
      if(f.mi === modelIdx){
        if(!findingsByAngle[code]) findingsByAngle[code] = [];
        findingsByAngle[code].push(f);
      }
    });
  }

  angles.forEach(function(angleCode){
    var angleFindings = findingsByAngle[angleCode] || [];
    var ws = worstSev(angleFindings);
    var isExpandDefault = (ws === "CRITICAL" || ws === "HIGH");
    var isFilterMatch = !filterAngle || filterAngle === angleCode;

    var section = document.createElement("details");
    section.className = "angle-section sev-"+(ws||"NONE");
    if((isExpandDefault && isFilterMatch) || (filterAngle === angleCode)){
      section.open = true;
    }

    /* Summary */
    var fullName = ANGLE_FULL_NAMES[angleCode] || angleCode;
    var summaryEl = document.createElement("summary");
    summaryEl.innerHTML = '<span class="angle-name">'+fullName+'</span>'+
      (ws && ws !== "NONE" ? severityPill(ws) : '')+
      '<span class="angle-count">'+angleFindings.length+' finding'+(angleFindings.length!==1?'s':'')+'</span>';
    section.appendChild(summaryEl);

    /* Body */
    var body = el("div","findings-body");

    if(angleFindings.length === 0){
      var noFind = el("div","","");
      noFind.style.cssText = "font-size:12px;color:var(--muted);padding:4px 0;";
      noFind.textContent = "No findings for this angle.";
      body.appendChild(noFind);
    } else {
      angleFindings.forEach(function(f){
        var card = el("div","finding-card");
        card.setAttribute("data-severity",f.s);
        if(!activeSevs[f.s]) card.classList.add("hidden-by-filter");

        /* Card top: check badge + sev pill */
        var topHtml = '<div class="card-top">';
        topHtml += '<span class="check-badge">'+f.ci+'</span>';
        topHtml += severityPill(f.s);
        topHtml += '</div>';

        /* Detail text */
        topHtml += '<div class="detail-text">'+esc(f.d)+'</div>';

        /* Metric bar */
        if(f.me !== undefined && f.me !== null && f.th){
          var metricPct = Math.round(f.me);
          var thresholdGreen = f.th.green || 80;
          var fillWidth = Math.min(100, Math.round(f.me / thresholdGreen * 100));
          var isOk = f.me >= thresholdGreen;
          topHtml += '<div class="metric-bar-wrap">';
          topHtml += '<div class="metric-bar-label">';
          topHtml += '<span>'+metricPct+'%</span>';
          topHtml += '<span>threshold: '+thresholdGreen+'%</span>';
          topHtml += '</div>';
          topHtml += '<div class="metric-bar"><div class="metric-bar-fill'+(isOk?' ok':'')+'" style="width:'+fillWidth+'%"></div></div>';
          topHtml += '</div>';
        }

        /* Recommendation */
        var rec = RECOMMENDATIONS[f.ci];
        if(rec){
          topHtml += '<div class="finding-recommendation">'+rec+'</div>';
        }

        card.innerHTML = topHtml;
        body.appendChild(card);
      });
    }

    section.appendChild(body);
    c.appendChild(section);
  });

  /* ── ERD placeholder ── */
  var erdContainer = el("div","erd-container");
  erdContainer.id = "erd-"+guid;
  erdContainer.innerHTML = '<div style="font-size:20px;">⬡</div>'+
    '<div class="erd-msg">ERD Diagram</div>'+
    '<div class="erd-sub">Click "ERD Diagram" button above to load</div>';
  c.appendChild(erdContainer);

  /* ── Dependents panel ── */
  var depsPanel = document.createElement("details");
  depsPanel.className = "dependents-panel";
  depsPanel.open = true;

  var deps = (D.C && D.C.dp && D.C.dp[guid]) ? D.C.dp[guid] : [];
  var depSummary = document.createElement("summary");
  depSummary.innerHTML = 'Downstream Consumers <span style="margin-left:auto;font-size:11px;color:var(--muted);font-weight:500;">'+deps.length+' object'+(deps.length!==1?'s':'')+'</span>';
  depsPanel.appendChild(depSummary);

  var depBody = el("div","dependents-body");
  if(deps.length === 0){
    var noDeps = el("div","","No downstream consumers found.");
    noDeps.style.cssText = "font-size:12px;color:var(--muted);padding:4px 0;";
    depBody.appendChild(noDeps);
  } else {
    deps.forEach(function(dep){
      var item = el("div","dependent-item");
      var typeHtml = '<span class="dep-type-badge '+esc(dep.t)+'">'+esc(dep.t)+'</span>';
      var nameHtml = '<span class="dep-name" title="'+esc(dep.n)+'">'+esc(dep.n)+'</span>';
      var guidHtml = '<span class="dep-guid">'+esc(dep.g)+'</span>';
      var linkHtml = (D.C && D.C.u) ? tsLink(D.C.u, dep.g, dep.t) : "";
      item.innerHTML = typeHtml + nameHtml + guidHtml + linkHtml;
      depBody.appendChild(item);
    });
  }
  depsPanel.appendChild(depBody);
  c.appendChild(depsPanel);

  /* ── Wire up ERD button ── */
  var erdBtn = document.getElementById("erd-toggle-"+guid);
  if(erdBtn){
    erdBtn.addEventListener("click",function(){
      var erd = document.getElementById("erd-"+guid);
      if(erd){
        erd.innerHTML = '<div style="font-size:20px;">⬡</div>'+
          '<div class="erd-msg">ERD diagram — coming soon</div>'+
          '<div class="erd-sub">Use /ts-object-model-erd for standalone ERD rendering.</div>';
        erd.scrollIntoView({behavior:"smooth",block:"nearest"});
      }
    });
  }

  /* ── Listen for severity filter changes ── */
  function applySevFilter(){
    $$(".finding-card",c).forEach(function(card){
      var sev = card.getAttribute("data-severity");
      if(activeSevs[sev]){
        card.classList.remove("hidden-by-filter");
      } else {
        card.classList.add("hidden-by-filter");
      }
    });
  }
  _sevFilterListener = applySevFilter;
  document.addEventListener("sev-filter-changed", _sevFilterListener);
}

/* ── Build Object Map ── */
var _objectmapSevListener = null;
function buildObjectMap(D, subTab){
  var c = document.getElementById("v-objectmap");
  c.innerHTML = "";

  if(_objectmapSevListener) document.removeEventListener("sev-filter-changed",_objectmapSevListener);

  /* Graceful fallback if no corpus */
  if(!D.C){
    c.innerHTML = '<div class="view-placeholder"><div class="ph-icon">⬡</div>'+
      '<div class="ph-text">Cross-model analysis unavailable</div>'+
      '<div class="ph-sub">Run with the latest ts-cli to enable cross-model analysis.</div></div>';
    return;
  }

  /* Sub-tab navigation */
  var tabs = el("div","object-map-tabs");
  var tabDefs = [
    {id:"overlaps",label:"Overlaps"},
    {id:"duplicates",label:"Duplicates"},
    {id:"table-reuse",label:"Table Reuse"},
    {id:"dependencies",label:"Dependencies"}
  ];
  tabDefs.forEach(function(td){
    var btn = el("button","",td.label);
    if(td.id === subTab) btn.classList.add("active");
    btn.setAttribute("data-subtab",td.id);
    btn.addEventListener("click",function(){
      navigate("#object-map/"+td.id);
    });
    tabs.appendChild(btn);
  });
  c.appendChild(tabs);

  /* Sub-tab content containers */
  tabDefs.forEach(function(td){
    var sec = el("div","om-subtab");
    sec.id = "om-"+td.id;
    if(td.id === subTab) sec.classList.add("active");
    c.appendChild(sec);
  });

  /* Build active sub-tab */
  switch(subTab){
    case "overlaps": buildOverlapsTab(D); break;
    case "duplicates": buildDuplicatesTab(D); break;
    case "table-reuse": buildTableReuseTab(D); break;
    case "dependencies": buildDependenciesTab(D); break;
    default: buildOverlapsTab(D); break;
  }
}

/* ── Overlaps sub-tab ── */
function buildOverlapsTab(D){
  var sec = document.getElementById("om-overlaps");
  if(!sec) return;
  var overlaps = (D.C && D.C.mo) ? D.C.mo : [];

  if(overlaps.length === 0){
    sec.innerHTML = '<div class="om-section"><div class="empty-state">No model overlaps detected.</div></div>';
    return;
  }

  var wrap = el("div","om-section");
  wrap.innerHTML = '<h3>Model Overlaps ('+overlaps.length+' pair'+(overlaps.length!==1?'s':'')+')</h3>';

  var tblWrap = el("div","","");
  tblWrap.style.overflowX = "auto";
  var tbl = el("table","overlap-table");

  /* Sort state */
  var sortCol = "j";
  var sortDir = "desc";

  var thead = document.createElement("thead");
  var hrow = document.createElement("tr");
  var colDefs = [
    {key:"a",label:"Model A"},
    {key:"b",label:"Model B"},
    {key:"j",label:"Jaccard"},
    {key:"sc",label:"Shared"},
    {key:"t",label:"Classification"},
    {key:"x",label:"Compare"}
  ];
  var thEls = [];
  colDefs.forEach(function(cd){
    var th = el("th","",cd.label);
    th.setAttribute("data-col",cd.key);
    if(cd.key !== "x"){
      th.addEventListener("click",function(){
        if(sortCol===cd.key){ sortDir=sortDir==="asc"?"desc":"asc"; }
        else { sortCol=cd.key; sortDir=cd.key==="j"?"desc":"asc"; }
        renderOverlaps();
      });
    }
    thEls.push(th);
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  tbl.appendChild(thead);

  var tbody = document.createElement("tbody");
  tbl.appendChild(tbody);
  tblWrap.appendChild(tbl);
  wrap.appendChild(tblWrap);
  sec.appendChild(wrap);

  function renderOverlaps(){
    var sorted = overlaps.slice().sort(function(a,b){
      var av,bv,cmp=0;
      if(sortCol==="j"){ cmp=a.j-b.j; }
      else if(sortCol==="sc"){ cmp=a.sc-b.sc; }
      else if(sortCol==="a"){ av=a.a.n.toLowerCase();bv=b.a.n.toLowerCase(); cmp=av<bv?-1:(av>bv?1:0); }
      else if(sortCol==="b"){ av=a.b.n.toLowerCase();bv=b.b.n.toLowerCase(); cmp=av<bv?-1:(av>bv?1:0); }
      else if(sortCol==="t"){ av=a.t;bv=b.t; cmp=av<bv?-1:(av>bv?1:0); }
      return sortDir==="asc"?cmp:-cmp;
    });

    /* Update header indicators */
    thEls.forEach(function(th){
      th.classList.remove("sort-asc","sort-desc");
      if(th.getAttribute("data-col")===sortCol){
        th.classList.add(sortDir==="asc"?"sort-asc":"sort-desc");
      }
    });

    tbody.innerHTML = "";
    sorted.forEach(function(o){
      var tr = document.createElement("tr");

      /* Model A */
      var tdA = el("td","");
      tdA.innerHTML = '<a href="#model/'+o.a.g+'">'+esc(o.a.n)+'</a>';
      tr.appendChild(tdA);

      /* Model B */
      var tdB = el("td","");
      tdB.innerHTML = '<a href="#model/'+o.b.g+'">'+esc(o.b.n)+'</a>';
      tr.appendChild(tdB);

      /* Jaccard */
      var tdJ = el("td","");
      tdJ.textContent = Math.round(o.j*100)+"%";
      tdJ.style.fontWeight = "600";
      tdJ.style.fontVariantNumeric = "tabular-nums";
      tr.appendChild(tdJ);

      /* Shared count */
      var tdSC = el("td","");
      tdSC.textContent = o.sc + " / " + o.ta + ", " + o.tb;
      tr.appendChild(tdSC);

      /* Classification badge */
      var tdT = el("td","");
      var badgeLabel = o.t.replace(/_/g," ");
      tdT.innerHTML = '<span class="overlap-badge '+o.t+'">'+badgeLabel+'</span>';
      tr.appendChild(tdT);

      /* Compare details */
      var tdX = el("td","");
      if(o.st && o.st.length > 0){
        var det = document.createElement("details");
        det.className = "overlap-compare";
        var sum = document.createElement("summary");
        sum.textContent = "Show "+o.st.length+" table"+(o.st.length!==1?"s":"");
        det.appendChild(sum);
        var ul = document.createElement("ul");
        o.st.forEach(function(tn){
          var li = document.createElement("li");
          li.textContent = tn;
          ul.appendChild(li);
        });
        det.appendChild(ul);
        tdX.appendChild(det);
      }
      tr.appendChild(tdX);

      tbody.appendChild(tr);
    });
  }

  renderOverlaps();
}

/* ── Duplicates sub-tab ── */
function buildDuplicatesTab(D){
  var sec = document.getElementById("om-duplicates");
  if(!sec) return;

  /* Filter D8 findings */
  var d8 = (D.F||[]).filter(function(f){ return f.ci==="D8"; });

  if(d8.length === 0){
    sec.innerHTML = '<div class="om-section"><div class="empty-state">No duplicate table objects found.</div></div>';
    return;
  }

  /* Group by detail (FQN) */
  var groups = {};
  var groupOrder = [];
  d8.forEach(function(f){
    var key = f.d || "(unknown)";
    if(!groups[key]){ groups[key]=[]; groupOrder.push(key); }
    groups[key].push(f);
  });

  var wrap = el("div","om-section");
  wrap.innerHTML = '<h3>Duplicate Table Objects ('+d8.length+' finding'+(d8.length!==1?'s':'')+')</h3>';

  groupOrder.forEach(function(key){
    var items = groups[key];
    var grp = el("div","","");
    grp.style.cssText = "margin-bottom:12px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--hair-2);border-radius:6px;";
    var hdr = el("div","","");
    hdr.style.cssText = "font-size:12px;font-weight:600;margin-bottom:6px;";
    hdr.textContent = key;
    grp.appendChild(hdr);

    items.forEach(function(f){
      var row = el("div","","");
      row.style.cssText = "display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px;";
      row.setAttribute("data-severity",f.s);
      var model = D.L[f.mi];
      var html = severityPill(f.s);
      if(model){
        html += ' <a href="#model/'+model.g+'">'+esc(model.n)+'</a>';
      }
      row.innerHTML = html;
      grp.appendChild(row);
    });

    wrap.appendChild(grp);
  });

  sec.appendChild(wrap);
}

      else if(sortCol==="n"){ av=a.n.toLowerCase();bv=b.n.toLowerCase(); cmp=av<bv?-1:(av>bv?1:0); }

    });

    tbody.innerHTML = "";

      });
      tdMS.innerHTML = links.join(", ");
      tr.appendChild(tdMS);

      tbody.appendChild(tr);
    });
  }

  renderReuseTable();
}

/* ── Sankey SVG builder ── */
function buildSankeySVG(container, reuse){
  var NS = "http://www.w3.org/2000/svg";

  /* Collect unique tables and models */
  var tables = [];
  var tableSet = {};
  var models = [];
  var modelSet = {};

  reuse.forEach(function(r){
    if(!tableSet[r.f]){ tableSet[r.f]=tables.length; tables.push({f:r.f,n:r.n}); }
    r.ms.forEach(function(m){
      if(!modelSet[m.g]){ modelSet[m.g]=models.length; models.push({n:m.n,g:m.g}); }
    });
  });

  var leftCount = tables.length;
  var rightCount = models.length;
  var nodeH = 20;
  var nodeGap = 6;
  var labelW = 150;
  var chartW = 700;
  var midW = chartW - labelW*2;
  var totalH = Math.max(leftCount, rightCount) * (nodeH + nodeGap) + 20;

  var svg = document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox","0 0 "+chartW+" "+totalH);
  svg.setAttribute("width","100%");
  svg.style.maxWidth = chartW+"px";
  svg.style.minHeight = Math.min(totalH, 600)+"px";

  /* Left nodes (tables) */
  var leftYStart = 10;
  var leftPositions = [];
  tables.forEach(function(t,i){
    var y = leftYStart + i * (nodeH + nodeGap);
    leftPositions.push(y + nodeH/2);

    var rect = document.createElementNS(NS,"rect");
    rect.setAttribute("x","0");
    rect.setAttribute("y",y);
    rect.setAttribute("width",labelW - 10);
    rect.setAttribute("height",nodeH);
    rect.setAttribute("rx","3");
    rect.setAttribute("fill","var(--accent-soft)");
    rect.setAttribute("stroke","var(--accent)");
    rect.setAttribute("stroke-width","1");
    svg.appendChild(rect);

    var text = document.createElementNS(NS,"text");
    text.setAttribute("x","6");
    text.setAttribute("y",y + nodeH/2 + 4);
    text.setAttribute("font-size","10");
    text.setAttribute("fill","var(--ink)");
    text.setAttribute("font-family","var(--sans)");
    text.textContent = t.n.length > 18 ? t.n.substring(0,16)+"..." : t.n;
    svg.appendChild(text);
  });

  /* Right nodes (models) */
  var rightYStart = 10;
  var rightPositions = [];
  models.forEach(function(m,i){
    var y = rightYStart + i * (nodeH + nodeGap);
    rightPositions.push(y + nodeH/2);

    var rect = document.createElementNS(NS,"rect");
    rect.setAttribute("x",chartW - labelW + 10);
    rect.setAttribute("y",y);
    rect.setAttribute("width",labelW - 10);
    rect.setAttribute("height",nodeH);
    rect.setAttribute("rx","3");
    rect.setAttribute("fill","var(--ok-soft)");
    rect.setAttribute("stroke","var(--ok)");
    rect.setAttribute("stroke-width","1");
    svg.appendChild(rect);

    var text = document.createElementNS(NS,"text");
    text.setAttribute("x",chartW - labelW + 16);
    text.setAttribute("y",y + nodeH/2 + 4);
    text.setAttribute("font-size","10");
    text.setAttribute("fill","var(--ink)");
    text.setAttribute("font-family","var(--sans)");
    text.textContent = m.n.length > 18 ? m.n.substring(0,16)+"..." : m.n;
    svg.appendChild(text);
  });

  /* Draw connections */
  reuse.forEach(function(r){
    var ti = tableSet[r.f];
    var leftY = leftPositions[ti];
    var x1 = labelW - 10;
    var x2 = chartW - labelW + 10;
    var cx1 = x1 + midW * 0.4;
    var cx2 = x2 - midW * 0.4;

    r.ms.forEach(function(m){
      var mi = modelSet[m.g];
      var rightY = rightPositions[mi];
      var path = document.createElementNS(NS,"path");
      path.setAttribute("d","M "+x1+" "+leftY+" C "+cx1+" "+leftY+" "+cx2+" "+rightY+" "+x2+" "+rightY);
      path.setAttribute("fill","none");
      path.setAttribute("stroke","var(--accent)");
      path.setAttribute("stroke-width","2");
      path.setAttribute("stroke-opacity","0.25");
      svg.appendChild(path);
    });
  });

  container.appendChild(svg);
}

/* ── Bar chart SVG builder ── */
function buildBarChart(container, items, fillColor){
  var NS = "http://www.w3.org/2000/svg";

  /* Sort by value descending */
  items = items.slice().sort(function(a,b){ return b.value - a.value; });

  var barH = 22;
  var barGap = 4;
  var labelW = 160;
  var valueW = 40;
  var chartW = 600;
  var barAreaW = chartW - labelW - valueW;
  var totalH = items.length * (barH + barGap) + 10;
  var maxVal = Math.max.apply(null, items.map(function(d){ return d.value; })) || 1;

  var svg = document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox","0 0 "+chartW+" "+totalH);
  svg.setAttribute("width","100%");
  svg.style.maxWidth = chartW+"px";
  svg.style.minHeight = Math.min(totalH, 500)+"px";

  items.forEach(function(item,i){
    var y = 5 + i * (barH + barGap);
    var barW = Math.max(2, (item.value / maxVal) * barAreaW);

    /* Label */
    var text = document.createElementNS(NS,"text");
    text.setAttribute("x",labelW - 8);
    text.setAttribute("y",y + barH/2 + 4);
    text.setAttribute("font-size","11");
    text.setAttribute("fill","var(--ink)");
    text.setAttribute("font-family","var(--sans)");
    text.setAttribute("text-anchor","end");
    text.textContent = item.label.length > 22 ? item.label.substring(0,20)+"..." : item.label;
    svg.appendChild(text);

    /* Bar */
    var rect = document.createElementNS(NS,"rect");
    rect.setAttribute("x",labelW);
    rect.setAttribute("y",y);
    rect.setAttribute("width",barW);
    rect.setAttribute("height",barH);
    rect.setAttribute("rx","3");
    rect.setAttribute("fill",fillColor);
    rect.setAttribute("fill-opacity","0.75");
    svg.appendChild(rect);

    /* Value label */
    var val = document.createElementNS(NS,"text");
    val.setAttribute("x",labelW + barW + 6);
    val.setAttribute("y",y + barH/2 + 4);
    val.setAttribute("font-size","11");
    val.setAttribute("fill","var(--muted)");
    val.setAttribute("font-family","var(--mono)");
    val.setAttribute("font-weight","600");
    val.textContent = item.value;
    svg.appendChild(val);
  });

  container.appendChild(svg);
}

/* ── Sortable dependency detail table ── */
function buildSortableDepTable(rows, colDefs, defaultSort){
  var sortCol = defaultSort || colDefs[0].key;
  var sortDir = "desc";

  var tbl = el("table","dep-detail-table");
  var thead = document.createElement("thead");
  var hrow = document.createElement("tr");
  var thEls = [];
  colDefs.forEach(function(cd){
    var th = el("th","",cd.label);
    th.setAttribute("data-col",cd.key);
    th.addEventListener("click",function(){
      if(sortCol===cd.key){ sortDir=sortDir==="asc"?"desc":"asc"; }
      else { sortCol=cd.key; sortDir=cd.key==="count"?"desc":"asc"; }
      render();
    });
    thEls.push(th);
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  tbl.appendChild(thead);

  var tbody = document.createElement("tbody");
  tbl.appendChild(tbody);

  function render(){
    var sorted = rows.slice().sort(function(a,b){
      var av = a[sortCol], bv = b[sortCol];
      var cmp;
      if(typeof av === "number" && typeof bv === "number"){ cmp = av - bv; }
      else { av=(av||"").toString().toLowerCase(); bv=(bv||"").toString().toLowerCase(); cmp=av<bv?-1:(av>bv?1:0); }
      return sortDir==="asc"?cmp:-cmp;
    });

    thEls.forEach(function(th){
      th.classList.remove("sort-asc","sort-desc");
      if(th.getAttribute("data-col")===sortCol){
        th.classList.add(sortDir==="asc"?"sort-asc":"sort-desc");
      }
    });

    tbody.innerHTML = "";
    sorted.forEach(function(r){
      var tr = document.createElement("tr");
      colDefs.forEach(function(cd){
        var td = el("td","");
        if(cd.key === "name" && r.guid){
          td.innerHTML = '<a href="#model/'+r.guid+'">'+esc(r[cd.key])+'</a>';
        } else {
          td.textContent = r[cd.key];
          if(cd.key === "count"){ td.style.fontWeight = "600"; }
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  render();
  return tbl;
}

/* ── Build Cleanup view ── */
var _cleanupSevListener = null;
function buildCleanup(D){
  var c = document.getElementById("v-cleanup");
  c.innerHTML = "";

  if(_cleanupSevListener) document.removeEventListener("sev-filter-changed",_cleanupSevListener);

  var findings = D.F || [];
  var h4 = findings.filter(function(f){ return f.ci==="H4"; });
  var h5 = findings.filter(function(f){ return f.ci==="H5"; });
  var h10 = findings.filter(function(f){ return f.ci==="H10"; });
  var hasAny = h4.length > 0 || h5.length > 0 || h10.length > 0;

  if(!hasAny && !D.C){
    c.innerHTML = '<div class="view-placeholder"><div class="ph-icon">✂</div>'+
      '<div class="ph-text">No cleanup actions available</div>'+
      '<div class="ph-sub">No orphan or stale object findings detected.</div></div>';
    return;
  }

  /* Copy button at top */
  var topBar = el("div","","");
  topBar.style.cssText = "display:flex;justify-content:flex-end;margin-bottom:12px;";
  var copyBtn = el("button","copy-btn","Copy Selected");
  copyBtn.addEventListener("click",function(){
    var checked = $$("input.cleanup-check:checked",c);
    if(checked.length === 0) return;
    var lines = checked.map(function(cb){
      return cb.getAttribute("data-name")+" | "+cb.getAttribute("data-guid");
    });
    navigator.clipboard.writeText(lines.join("\n")).then(function(){
      showToast("Copied "+checked.length+" item"+(checked.length!==1?"s":"")+"!");
    });
  });
  topBar.appendChild(copyBtn);
  c.appendChild(topBar);

  /* Orphan models (H4) */
  buildCleanupSection(c, "Orphan Models", h4, D, "No orphan models found.");

  /* Orphan sets (H5) */
  buildCleanupSection(c, "Orphan Sets", h5, D, "No orphan sets found.");

  /* Stale objects (H10) */
  if(h10.length > 0){
    var modelLevel = h10.filter(function(f){ return !(f.d||"").toLowerCase().match(/column/); });
    var colLevel = h10.filter(function(f){ return (f.d||"").toLowerCase().match(/column/); });

    if(modelLevel.length > 0){
      buildCleanupSection(c, "Stale Objects (Model-level)", modelLevel, D, "");
    }
    if(colLevel.length > 0){
      buildCleanupSection(c, "Stale Objects (Column-level)", colLevel, D, "");
    }
    if(modelLevel.length === 0 && colLevel.length === 0){
      buildCleanupSection(c, "Stale Objects", h10, D, "");
    }
  } else {
    var noStale = el("div","cleanup-section");
    noStale.innerHTML = '<h3>Stale Objects</h3><div class="empty-state">No stale objects found.</div>';
    c.appendChild(noStale);
  }

  /* Wire severity filter */
  function applySevFilter(){
    $$("tr[data-severity]",c).forEach(function(tr){
      var sev = tr.getAttribute("data-severity");
      tr.style.display = activeSevs[sev] ? "" : "none";
    });
  }
  _cleanupSevListener = applySevFilter;
  document.addEventListener("sev-filter-changed",_cleanupSevListener);
}

/* ── Build Cross-Model view ── */
function buildCrossModel(D, initialFilters){
  var c = document.getElementById("v-crossmodel");
  c.innerHTML = "";

  /* Remove old listener before rebuilding */
  if(_crossmodelSevListener) document.removeEventListener("sev-filter-changed", _crossmodelSevListener);

  initialFilters = initialFilters || {};

  /* Resolve initial filter values */
  var initSev = initialFilters.severity || null;  /* e.g. "HIGH" */
  var initAngle = initialFilters.angle || null;   /* e.g. "D" (short code) or full angle name */

  /* Normalise angle filter: convert short code to full angle name if needed */
  if(initAngle && ANGLE_SHORT[initAngle]){
    initAngle = ANGLE_SHORT[initAngle]; /* "D" → "data_modeling" */
  }

  var findings = D.F || [];

  /* Sort state */
  var sortCol = "s";   /* default: sort by severity */
  var sortDir = "asc"; /* "asc" | "desc" */

  /* ── Filter toolbar ── */
  var toolbar = el("div","crossmodel-filter");
  var searchInput = document.createElement("input");
  searchInput.type = "search";
  searchInput.placeholder = "Search models, check IDs, details…";
  searchInput.setAttribute("aria-label","Search findings");
  toolbar.appendChild(searchInput);

  var groupLabel = el("label","");
  var groupChk = document.createElement("input");
  groupChk.type = "checkbox";
  groupChk.id = "cm-group-by-check";
  groupLabel.appendChild(groupChk);
  groupLabel.appendChild(document.createTextNode(" Group by check ID"));
  toolbar.appendChild(groupLabel);

  var showAllLabel = el("label","");
  var showAllChk = document.createElement("input");
  showAllChk.type = "checkbox";
  showAllChk.id = "cm-show-all-checks";
  showAllLabel.appendChild(showAllChk);
  showAllLabel.appendChild(document.createTextNode(" Show all checks"));
  showAllLabel.style.display = "none";
  toolbar.appendChild(showAllLabel);

  var countEl = el("span","cm-count","");
  toolbar.appendChild(countEl);
  c.appendChild(toolbar);

  /* ── Table wrapper ── */
  var wrap = el("div","crossmodel-wrap");
  var table = el("table","crossmodel-table");
  table.setAttribute("role","grid");

  /* Header */
  var thead = document.createElement("thead");
  var hrow = document.createElement("tr");
  var cols = [
    {key:"s",  label:"Severity", cls:"col-sev"},
    {key:"ci", label:"Check",    cls:"col-check"},
    {key:"a",  label:"Angle",    cls:"col-angle"},
    {key:"mi", label:"Model",    cls:"col-model"},
    {key:"ot", label:"Type",     cls:"col-type"},
    {key:"d",  label:"Detail",   cls:"col-detail"}
  ];
  var thEls = [];
  cols.forEach(function(col){
    var th = el("th", col.cls, col.label);
    th.setAttribute("data-col", col.key);
    th.setAttribute("tabindex","0");
    thEls.push(th);
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  var tbody = document.createElement("tbody");
  table.appendChild(tbody);
  wrap.appendChild(table);
  c.appendChild(wrap);

  /* ── Sort function ── */
  function sortFindings(arr){
    return arr.slice().sort(function(a,b){
      var av, bv, cmp = 0;
      if(sortCol === "s"){
        av = SEV_ORDER[a.s] !== undefined ? SEV_ORDER[a.s] : 99;
        bv = SEV_ORDER[b.s] !== undefined ? SEV_ORDER[b.s] : 99;
        cmp = av - bv;
      } else if(sortCol === "ci"){
        av = a.ci || "";
        bv = b.ci || "";
        cmp = av < bv ? -1 : (av > bv ? 1 : 0);
      } else if(sortCol === "a"){
        av = (ANGLE_LABELS[a.a] || a.a || "").toLowerCase();
        bv = (ANGLE_LABELS[b.a] || b.a || "").toLowerCase();
        cmp = av < bv ? -1 : (av > bv ? 1 : 0);
      } else if(sortCol === "mi"){
        av = (D.L[a.mi] ? D.L[a.mi].n : "").toLowerCase();
        bv = (D.L[b.mi] ? D.L[b.mi].n : "").toLowerCase();
        cmp = av < bv ? -1 : (av > bv ? 1 : 0);
      } else if(sortCol === "ot"){
        av = (a.ot || "").toLowerCase();
        bv = (b.ot || "").toLowerCase();
        cmp = av < bv ? -1 : (av > bv ? 1 : 0);
      } else if(sortCol === "d"){
        av = (a.d || "").toLowerCase();
        bv = (b.d || "").toLowerCase();
        cmp = av < bv ? -1 : (av > bv ? 1 : 0);
      }
      return sortDir === "asc" ? cmp : -cmp;
    });
  }

  /* ── Update sort header indicators ── */
  function updateSortHeaders(){
    thEls.forEach(function(th){
      th.classList.remove("sort-asc","sort-desc");
      if(th.getAttribute("data-col") === sortCol){
        th.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");
      }
    });
  }

  /* ── Check if a row passes text search ── */
  function rowMatchesSearch(f, searchTerm){
    if(!searchTerm) return true;
    var term = searchTerm.toLowerCase();
    var modelName = (D.L[f.mi] ? D.L[f.mi].n : "").toLowerCase();
    var detail = (f.d || "").toLowerCase();
    var checkId = (f.ci || "").toLowerCase();
    var angle = (ANGLE_LABELS[f.a] || f.a || "").toLowerCase();
    var objectType = (f.ot || "").toLowerCase();
    return modelName.indexOf(term) !== -1
        || detail.indexOf(term) !== -1
        || checkId.indexOf(term) !== -1
        || angle.indexOf(term) !== -1
        || objectType.indexOf(term) !== -1;
  }

  /* ── Build a single data row ── */
  function buildRow(f){
    var tr = document.createElement("tr");
    tr.setAttribute("data-severity", f.s);
    tr.setAttribute("data-angle", f.a);
    var mi = f.mi;
    tr.setAttribute("data-model", mi);
    tr.setAttribute("data-check", f.ci || "");

    /* Severity cell */
    var tdSev = el("td","col-sev");
    tdSev.innerHTML = severityPill(f.s);
    tr.appendChild(tdSev);

    /* Check ID cell */
    var tdCheck = el("td","col-check");
    tdCheck.textContent = f.ci || "";
    tr.appendChild(tdCheck);

    /* Angle cell */
    var tdAngle = el("td","col-angle");
    tdAngle.textContent = ANGLE_LABELS[f.a] || f.a || "";
    tr.appendChild(tdAngle);

    /* Model cell */
    var tdModel = el("td","col-model");
    var model = D.L[mi];
    if(model){
      var mHtml = '<a class="model-link" href="#model/'+model.g+'" data-route="#model/'+model.g+'">'+esc(model.n)+'</a>';
      if(D.C && D.C.u){
        mHtml += '<a class="ts-icon" href="'+D.C.u+'/#/data/tables/'+model.g+'" target="_blank" rel="noopener" title="Open in ThoughtSpot">↗</a>';
      }
      tdModel.innerHTML = mHtml;
    } else {
      tdModel.textContent = "(model "+mi+")";
    }
    tr.appendChild(tdModel);

    /* Type cell */
    var tdType = el("td","col-type");
    tdType.textContent = f.ot || "";
    tr.appendChild(tdType);

    /* Detail cell */
    var tdDetail = el("td","col-detail detail-cell");
    tdDetail.textContent = f.d || "";
    tr.appendChild(tdDetail);

    return tr;
  }

  /* ── Render table body ── */
  function renderTable(){
    var searchTerm = searchInput.value;
    var grouped = groupChk.checked;
    var sorted = sortFindings(findings);

    /* Apply initial angle filter */
    var visible = sorted.filter(function(f){
      if(initSev && f.s !== initSev) return false;
      if(initAngle && f.a !== initAngle) return false;
      return true;
    });

    /* Apply text search */
    var filtered = visible.filter(function(f){
      return rowMatchesSearch(f, searchTerm);
    });

    tbody.innerHTML = "";
    var shownCount = 0;

    if(grouped){
      /* Group by check ID */
      var allCheckIds = (D.S && D.S.ac) ? D.S.ac : [];
      var groups = {};
      var groupOrder = [];

      if(showAllChk.checked){
        allCheckIds.forEach(function(cid){
          if(!groups[cid]){ groups[cid] = []; groupOrder.push(cid); }
        });
      }

      filtered.forEach(function(f){
        var key = f.ci || "(no check)";
        if(!groups[key]){ groups[key] = []; groupOrder.push(key); }
        groups[key].push(f);
      });

      groupOrder.forEach(function(key){
        var gFindings = groups[key];
        var checkDesc = (D.K && D.K[key]) ? D.K[key].d : "";
        var checkThresh = (D.K && D.K[key]) ? D.K[key].t : "";
        /* Group header row */
        var ghTr = document.createElement("tr");
        ghTr.className = "group-header";
        var ghTd = document.createElement("td");
        ghTd.colSpan = cols.length;
        var ghHtml = '<span class="gh-id">'+esc(key)+'</span>';
        if(checkDesc) ghHtml += '<span class="gh-desc">'+esc(checkDesc)+'</span>';
        ghHtml += '<span class="gh-count">'+gFindings.length+' finding'+(gFindings.length!==1?'s':'')+'</span>';
        if(checkThresh) ghHtml += '<span class="gh-thresh">'+esc(checkThresh)+'</span>';
        ghTd.innerHTML = ghHtml;
        ghTr.appendChild(ghTd);
        tbody.appendChild(ghTr);

        if(gFindings.length === 0){
          var emptyTr = document.createElement("tr");
          emptyTr.className = "group-empty";
          var emptyTd = document.createElement("td");
          emptyTd.colSpan = cols.length;
          emptyTd.textContent = "No findings — all checks passed";
          emptyTr.appendChild(emptyTd);
          tbody.appendChild(emptyTr);
        } else {
          gFindings.forEach(function(f){
            var tr = buildRow(f);
            if(!activeSevs[f.s]) tr.style.display = "none";
            else shownCount++;
            tbody.appendChild(tr);
          });
        }
      });
    } else {
      filtered.forEach(function(f){
        var tr = buildRow(f);
        if(!activeSevs[f.s]) tr.style.display = "none";
        else shownCount++;
        tbody.appendChild(tr);
      });
    }

    countEl.textContent = shownCount + " finding" + (shownCount !== 1 ? "s" : "");
  }

  /* ── Wire header sort clicks ── */
  thEls.forEach(function(th){
    th.addEventListener("click",function(){
      var col = th.getAttribute("data-col");
      if(sortCol === col){
        sortDir = sortDir === "asc" ? "desc" : "asc";
      } else {
        sortCol = col;
        sortDir = "asc";
      }
      updateSortHeaders();
      renderTable();
    });
    th.addEventListener("keydown",function(e){
      if(e.key === "Enter" || e.key === " "){ e.preventDefault(); th.click(); }
    });
  });

  /* ── Wire search input ── */
  searchInput.addEventListener("input", renderTable);

  /* ── Wire group-by and show-all checkboxes ── */
  groupChk.addEventListener("change", function(){
    showAllLabel.style.display = groupChk.checked ? "" : "none";
    if(!groupChk.checked) showAllChk.checked = false;
    renderTable();
  });
  showAllChk.addEventListener("change", renderTable);

  /* ── Wire severity filter ── */
  function applyCrossmodelSevFilter(){
    $$("tr[data-severity]", tbody).forEach(function(tr){
      var sev = tr.getAttribute("data-severity");
      tr.style.display = activeSevs[sev] ? "" : "none";
    });
    /* Recount visible */
    var shown = $$("tr[data-severity]", tbody).filter(function(tr){ return tr.style.display !== "none"; }).length;
    countEl.textContent = shown + " finding" + (shown !== 1 ? "s" : "");
  }
  _crossmodelSevListener = applyCrossmodelSevFilter;
  document.addEventListener("sev-filter-changed", _crossmodelSevListener);

  /* ── Set initial sort indicator ── */
  updateSortHeaders();

  /* ── Pre-populate search box if angle filter applied (for UX clarity) ── */
  /* Not setting search text — angle filter is structural, not text-based */

  /* ── Initial render ── */
  renderTable();
}

/* ── Build Dashboard ── */
function buildDashboard(){
  var c = document.getElementById("v-dashboard");
  var html = "";

  /* Header bar */
  html += '<div class="dash-header">';
  if(D.C){
    if(D.C.u){
      html += '<a class="cluster-url" href="'+D.C.u+'" target="_blank" rel="noopener">'+esc(D.C.u)+' <span class="ext">↗</span></a>';
    }
    if(D.C.p) html += '<span class="meta-item">Profile: <strong>'+esc(D.C.p)+'</strong></span>';
    if(D.C.dt) html += '<span class="meta-item">Date: <strong>'+esc(D.C.dt)+'</strong></span>';
    if(D.C.ar && D.C.ar.length > 0){
      html += '<div class="angles">';
      D.C.ar.forEach(function(code){
        var a = ANGLE_SHORT[code] || code;
        html += '<span class="angle-tag">'+(ANGLE_LABELS[a]||a)+'</span>';
      });
      html += '</div>';
    }
  } else {
    html += '<span class="meta-item">Audit report &mdash; no corpus data</span>';
  }
  html += '</div>';

  /* Severity cards */
  html += '<div class="sev-cards">';
  SEVS.forEach(function(s){
    var count = (D.S && D.S.bs) ? (D.S.bs[s]||0) : 0;
    html += '<div class="sev-card" data-sev="'+s+'" tabindex="0" role="button" aria-label="'+count+' '+s.toLowerCase()+' findings">';
    html += '<div class="sev-count">'+count+'</div>';
    html += '<div class="sev-label" data-count="'+count+'">'+s+'</div>';
    html += '</div>';
  });
  html += '</div>';

  /* Heatmap */
  html += buildHeatmap();

  /* Stats strip */
  html += '<div class="stats-strip">';
  var os = (D.S && D.S.os) || {};
  var stats = [
    {v: os.models || 0, l: "Models", tip: "Number of ThoughtSpot models scanned", hash: "#objectmap/dependencies"},
    {v: os.tables || 0, l: "Tables", tip: "Total tables across all scanned models", hash: "#objectmap/table-reuse"},
    {v: D.S ? (D.S.cr||0) : 0, l: "Checks Run", tip: "Audit checks evaluated across all models", hash: "#crossmodel"},
    {v: D.F ? D.F.length : 0, l: "Total Findings", tip: "Total findings across all severity levels", hash: "#crossmodel"}
  ];
  stats.forEach(function(s){
    html += '<div class="stat-box" data-hash="'+s.hash+'" title="'+s.tip+'" tabindex="0" role="button" style="cursor:pointer;">';
    html += '<div class="stat-value">'+s.v+'</div>';
    html += '<div class="stat-label">'+s.l+'</div>';
    html += '</div>';
  });
  html += '</div>';

  c.innerHTML = html;

  /* Wire up severity card clicks */
  $$(".sev-card",c).forEach(function(card){
    card.addEventListener("click",function(){
      navigate("#crossmodel?severity="+card.getAttribute("data-sev"));
    });
    card.addEventListener("keydown",function(e){
      if(e.key === "Enter" || e.key === " "){
        e.preventDefault();
        navigate("#crossmodel?severity="+card.getAttribute("data-sev"));
      }
    });
  });

  /* Wire up stat box clicks */
  $$(".stat-box",c).forEach(function(box){
    box.addEventListener("click",function(){
      var hash = box.getAttribute("data-hash");
      if(hash) navigate(hash);
    });
    box.addEventListener("keydown",function(e){
      if(e.key === "Enter" || e.key === " "){
        e.preventDefault();
        var hash = box.getAttribute("data-hash");
        if(hash) navigate(hash);
      }
    });
  });

  /* Wire up heatmap cell clicks */
  $$(".heatmap .cell",c).forEach(function(cell){
    cell.addEventListener("click",function(){
      var guid = cell.getAttribute("data-guid");
      var angle = cell.getAttribute("data-angle");
      if(guid && angle) navigate("#model/"+guid+"/"+angle);
    });
  });

  /* Wire up angle column header clicks */
  var angleHeaders = c.querySelectorAll("th.angle-col");
  Array.prototype.slice.call(angleHeaders).forEach(function(th){
    th.style.cursor = "pointer";
    th.addEventListener("click",function(){
      navigate("#crossmodel?angle="+th.getAttribute("data-angle"));
    });
  });

}

/* ── Heatmap builder ── */
function buildHeatmap(){
  if(!D.F || D.F.length === 0){
    return '<div class="heatmap-wrap"><div class="heatmap-title">Cluster Heatmap</div>'+
           '<p style="color:var(--muted);font-size:12px;">No findings to display.</p></div>';
  }

  /* Determine angles present */
  var anglesPresent = {};
  D.F.forEach(function(f){ anglesPresent[f.a] = true; });
  var angleKeys = Object.keys(ANGLE_LABELS).filter(function(a){ return anglesPresent[a]; });

  /* Group findings by model index */
  var byModel = {};
  D.F.forEach(function(f){
    if(!byModel[f.mi]) byModel[f.mi] = {};
    if(!byModel[f.mi][f.a]) byModel[f.mi][f.a] = [];
    byModel[f.mi][f.a].push(f);
  });

  /* Build rows: [{mi, name, guid, worstOverall, cells:{angle:severity}}] */
  var rows = [];
  Object.keys(byModel).forEach(function(mi){
    mi = parseInt(mi);
    var m = D.L[mi];
    if(!m) return;
    var cells = {};
    var allFindings = [];
    angleKeys.forEach(function(a){
      var ff = byModel[mi][a] || [];
      cells[a] = ff.length > 0 ? worstSev(ff) : "NONE";
      allFindings = allFindings.concat(ff);
    });
    rows.push({mi:mi, n:m.n, g:m.g, worst: worstSev(allFindings), cells:cells});
  });

  /* Sort by worst severity descending (critical first) */
  rows.sort(function(a,b){
    return (SEV_ORDER[a.worst]||99) - (SEV_ORDER[b.worst]||99);
  });

  /* Build table */
  var html = '<div class="heatmap-wrap">';
  html += '<div class="heatmap-title">Cluster Heatmap</div>';
  html += '<table class="heatmap"><thead><tr>';
  html += '<th class="model-col">Model</th>';
  angleKeys.forEach(function(a){
    html += '<th class="angle-col" data-angle="'+a+'" title="Filter by '+ANGLE_LABELS[a]+'">'+
            ANGLE_LABELS[a]+'</th>';
  });
  html += '</tr></thead><tbody>';

  rows.forEach(function(r){
    html += '<tr>';
    html += '<td class="model-name"><a href="#model/'+r.g+'" title="'+esc(r.n)+'">'+esc(r.n)+'</a></td>';
    angleKeys.forEach(function(a){
      var sev = r.cells[a] || "NONE";
      var cellText = sev === "NONE" ? "" : sev === "PASS" ? "✓" : sev.charAt(0);
      html += '<td><span class="cell" data-severity="'+sev+'" data-guid="'+r.g+'" data-angle="'+a+
              '" title="'+esc(r.n)+' / '+(ANGLE_LABELS[a]||a)+': '+sev+'" role="button" tabindex="0">'+cellText+'</span></td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';

  return html;
}

/* ── Hamburger ── */
var hamburger = $(".hamburger");
var sidebar = $(".sidebar");
if(hamburger && sidebar){
  hamburger.addEventListener("click",function(){
    sidebar.classList.toggle("open");
  });
  /* Close on link click (mobile) */
  sidebar.addEventListener("click",function(e){
    if(e.target.closest("a[data-route]") && window.innerWidth <= 768){
      sidebar.classList.remove("open");
    }
  });
}

/* ── Init ── */
buildSidebar();
buildFilterPills();
window.addEventListener("hashchange", onRoute);
onRoute();

})();
